<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart School Dashboard</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       🎨 MODERN GLASSMORPHISM THEME
       ========================================= */
    :root {
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: 1px solid rgba(255, 255, 255, 0.6);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --bg-gradient: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
      --text-main: #2d3748;
      --text-muted: #718096;
      --radius: 24px;
    }

    body {
      background-color: #f3f4f6;
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,0) 0, hsla(253,16%,7%,0) 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,0) 0, hsla(225,39%,30%,0) 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,0) 0, hsla(339,49%,30%,0) 50%);
      background: var(--bg-gradient); /* สีพื้นหลังหลัก */
      font-family: 'Sarabun', sans-serif;
      color: var(--text-main);
      padding: 2rem;
      min-height: 100vh;
    }

    /* ใช้ฟอนต์ Sarabun กับหัวข้อเพื่อให้ดูทันสมัย */
    h1, h2, h3, h4, h5, h6, .dashboard-title, .stat-value {
      font-family: 'Sarabun', sans-serif;
      font-weight: 600;
    }

    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- Header Styles --- */
    .dashboard-title {
      font-weight: 600;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0px 2px 4px rgba(0,0,0,0.05);
    }

    .school-logo {
      width: clamp(45px, 6vw, 55px);
      height: clamp(45px, 6vw, 55px);
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }

    /* --- Glass Cards --- */
    .stat-card, .chart-container {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius);
      border: var(--glass-border);
      box-shadow: var(--glass-shadow);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
      border-color: #fff;
    }

    /* --- Stats & Avatars --- */
    .stat-label { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }
    .stat-value { font-size: clamp(2rem, 4vw, 2.8rem); font-weight: 600; line-height: 1.2; color: #1a202c; }
    .stat-meta { font-size: 0.8rem; color: #a0aec0; margin-top: 4px; }

    .avatar-circle {
      width: 60px;
      height: 60px;
      border-radius: 18px; /* iOS Style */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    .avatar-total { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); color: #fff; }
    .avatar-male { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); color: #fff; }
    .avatar-female { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); color: #fff; }
    
    .avatar-icon { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

    /* --- Buttons --- */
    .btn-glass {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 50px;
      color: var(--text-main);
      font-weight: 500;
      padding: 0.5rem 1.2rem;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }
    .btn-glass:hover {
      background: #fff;
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    /* --- Loading & Skeleton --- */
    .loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 10; border-radius: var(--radius);
    }

    /* Mini Stat Cards inside Academic Section */
    .mini-stat-box {
      background: rgba(247, 250, 252, 0.8);
      border-radius: 16px;
      padding: 1rem;
      text-align: center;
      border: 1px solid rgba(0,0,0,0.03);
      transition: transform 0.2s;
    }
    .mini-stat-box:hover { transform: translateY(-2px); background: #fff; }

    @media (max-width: 768px) {
      body { padding: 1rem; }
      .stat-value { font-size: 2rem; }
      .dashboard-title { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="container-fluid animate-fade-in" style="max-width: 1400px;">
    
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
      <div class="d-flex align-items-center gap-3">
        <img id="schoolLogo" src="" alt="" class="school-logo" style="display: none;">
        <div>
          <h2 class="mb-0 dashboard-title">
            <i class="bi bi-grid-fill me-2"></i>Smart Dashboard
          </h2>
          <div class="text-muted" id="schoolName" style="font-weight: 500;">กำลังโหลดข้อมูล...</div>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-glass" id="refreshDashboard">
          <i class="bi bi-arrow-clockwise"></i> รีเฟรช
        </button>
        <button class="btn btn-glass text-danger" id="clearCache">
          <i class="bi bi-trash"></i> ล้าง Cache
        </button>
      </div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-12 col-lg-4">
        <div class="stat-card p-4 h-100 d-flex align-items-center justify-content-between">
          <div>
            <div class="stat-label">นักเรียนทั้งหมด</div>
            <div class="stat-value" id="totalCount">-</div>
            <div class="stat-meta" id="lastUpdated"><span class="spinner-grow spinner-grow-sm text-primary" role="status"></span> กำลังโหลด...</div>
          </div>
          <div class="avatar-circle avatar-total">
            <i class="bi bi-people-fill avatar-icon"></i>
          </div>
        </div>
      </div>
      
      <div class="col-12 col-sm-6 col-lg-4">
        <div class="stat-card p-4 h-100 d-flex align-items-center justify-content-between">
          <div>
            <div class="stat-label">นักเรียนชาย</div>
            <div class="stat-value text-primary" id="maleCount">-</div>
          </div>
          <div class="avatar-circle avatar-male">
            <i class="bi bi-gender-male avatar-icon"></i>
          </div>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-lg-4">
        <div class="stat-card p-4 h-100 d-flex align-items-center justify-content-between">
          <div>
            <div class="stat-label">นักเรียนหญิง</div>
            <div class="stat-value text-danger" id="femaleCount">-</div>
          </div>
          <div class="avatar-circle avatar-female">
            <i class="bi bi-gender-female avatar-icon"></i>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      
      <div class="col-12 col-lg-8">
        <div class="chart-container p-4 h-100" id="academicSection">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-bar-chart-line-fill text-primary me-2"></i>คะแนนเฉลี่ยรายชั้น</h5>
            <span class="badge bg-light text-dark border">ปีการศึกษาปัจจุบัน</span>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
              <div class="mini-stat-box">
                <h4 class="mb-0 text-primary" id="academicAvgScore">-</h4>
                <small class="text-muted">คะแนนเฉลี่ย</small>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="mini-stat-box">
                <h4 class="mb-0 text-success" id="academicAvgGrade">-</h4>
                <small class="text-muted">เกรดเฉลี่ย</small>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="mini-stat-box">
                <h4 class="mb-0 text-info" id="academicPassRate">-</h4>
                <small class="text-muted">% ผ่าน</small>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="mini-stat-box">
                <h4 class="mb-0 text-secondary" id="academicTotalStudents">-</h4>
                <small class="text-muted">จำนวนข้อมูล</small>
              </div>
            </div>
          </div>

          <div style="height: 320px; position: relative;">
            <canvas id="academicGradeChart"></canvas>
            <div class="loading-overlay" id="academicLoading1">
              <div class="spinner-border text-primary" role="status"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="chart-container p-4 h-100">
          <h5 class="mb-4 fw-bold text-dark"><i class="bi bi-pie-chart-fill text-warning me-2"></i>สัดส่วนเกรด</h5>
          <div style="height: 300px; position: relative;">
            <canvas id="academicDistChart"></canvas>
            <div class="loading-overlay" id="academicLoading2">
              <div class="spinner-border text-warning" role="status"></div>
            </div>
          </div>
          <div class="mt-3 text-center text-muted small">
            * ข้อมูลรวมทุกระดับชั้น
          </div>
        </div>
      </div>
    </div>

    <div id="attendanceSection" class="chart-container p-4 mt-4" hidden>
      <h5 class="mb-3">📅 สถิติการเช็คชื่อ</h5>
      </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script>
    (function() {
      'use strict';
      
      const DashboardController = {
        initialized: false,
        initializing: false,
        chartJsLoaded: false,
        charts: { academicGrade: null, academicDist: null },
        
        destroy() {
          if (this.charts.academicGrade) this.charts.academicGrade.destroy();
          if (this.charts.academicDist) this.charts.academicDist.destroy();
          this.charts = { academicGrade: null, academicDist: null };
        }
      };

      // --- Helper Functions ---
      function waitForGAS(callback, retries = 0) {
        if (window.google && window.google.script && window.google.script.run) return callback();
        if (retries > 20) return console.error('❌ GAS not found');
        setTimeout(() => waitForGAS(callback, retries + 1), 200);
      }

      function animateNumber(element, start, end, duration) {
        if (!element) return;
        const endNum = parseInt(end) || 0;
        if (endNum === 0) { element.textContent = "0"; return; }
        const startTime = performance.now();
        const step = (currentTime) => {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 3); // Cubic ease out
          element.textContent = Math.floor(start + (endNum - start) * ease).toLocaleString();
          if (progress < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }

      // --- 1. Render Fast Stats (Hero Section) ---
      function renderDashboardData(data) {
        try {
          if (!data) return;
          const summary = data.summary || data; // รองรับทั้งโครงสร้างเก่าและใหม่

          const total = Number(summary.total || summary.totalStudents || 0);
          const male = Number(summary.male || summary.males || 0);
          const female = Number(summary.female || summary.females || 0);

          animateNumber(document.getElementById('totalCount'), 0, total, 1000);
          animateNumber(document.getElementById('maleCount'), 0, male, 1200);
          animateNumber(document.getElementById('femaleCount'), 0, female, 1400);

          const luEl = document.getElementById('lastUpdated');
          if (luEl) {
             const time = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute:'2-digit'});
             luEl.innerHTML = `<i class="bi bi-clock-history"></i> อัพเดต: ${time} น.`;
          }
        } catch (e) { console.error('Render error', e); }
      }

      // --- 2. Render Settings (Logo) ---
      function renderSettings(settings) {
        if (!settings) return;
        if (settings['ชื่อโรงเรียน']) document.getElementById('schoolName').textContent = settings['ชื่อโรงเรียน'];
        
        if (settings['logo']) {
          const img = document.getElementById('schoolLogo');
          const urls = [settings['logo'], settings['logoUrl_backup1'], settings['logoUrl_backup2']].filter(u => u);
          
          let i = 0;
          const loadImg = () => {
            if (i >= urls.length) return;
            img.src = urls[i];
            img.style.display = 'block';
            img.onerror = () => { i++; loadImg(); };
          };
          loadImg();
        }
      }

      // --- 3. Academic Logic ---
      function loadAcademicData() {
        waitForGAS(() => {
          google.script.run.withSuccessHandler(data => {
            if (data && data.hasData) {
              document.getElementById('academicAvgScore').textContent = data.overall.avgScore.toFixed(2);
              document.getElementById('academicAvgGrade').textContent = data.overall.avgGrade.toFixed(2);
              document.getElementById('academicPassRate').textContent = data.overall.passRate.toFixed(1) + '%';
              document.getElementById('academicTotalStudents').textContent = data.overall.totalStudents;
            } else {
              // Show empty state if needed
            }
          }).getAcademicDashboardSummary();
        });
      }

      function loadCharts() {
        waitForGAS(() => {
          // Chart 1: Bar Chart
          google.script.run.withSuccessHandler(data => {
            renderGradeChart(data);
            document.getElementById('academicLoading1').style.display = 'none';
          }).getGradeComparisonChartData();

          // Chart 2: Donut Chart
          google.script.run.withSuccessHandler(data => {
            renderDistChart(data);
            document.getElementById('academicLoading2').style.display = 'none';
          }).getOverallGradeDistributionChartData();
        });
      }

      // --- Chart.js Rendering (Modern Style) ---
      // --- Chart.js Rendering (Modern Style with Square Bars & Multi-Colors) ---
function renderGradeChart(chartData) {
  const ctx = document.getElementById('academicGradeChart');
  if (!ctx || !chartData.hasData) return;

  // 🔥 ลบ Chart เดิมก่อนสร้างใหม่
  if (DashboardController.charts.academicGrade) {
    DashboardController.charts.academicGrade.destroy();
  }

  DashboardController.charts.academicGrade = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: chartData.labels,
      datasets: [{
        label: 'คะแนนเฉลี่ย',
        data: chartData.datasets[0].data,
        // 🎨 ใช้สีจาก Backend (ที่มีการสลับสีแล้ว)
        backgroundColor: chartData.datasets[0].backgroundColor,
        borderColor: chartData.datasets[0].borderColor,
        borderWidth: 2,
        borderRadius: 0,        // 🔥 แท่งมุมฉาก (ไม่มน)
        borderSkipped: false,   // 🔥 ให้มีขอบทุกด้าน
        barPercentage: 0.7      // ความหนาของแท่ง
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(0, 0, 0, 0.8)',
          padding: 12,
          titleFont: { family: 'Sarabun', size: 14 },
          bodyFont: { family: 'Sarabun', size: 13 },
          cornerRadius: 8,
          displayColors: false,
          callbacks: {
            title: function(context) {
              return context[0].label;
            },
            label: function(context) {
              return `คะแนนเฉลี่ย: ${context.parsed.y.toFixed(2)}`;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100,
          ticks: {
            stepSize: 10,
            font: { family: 'Sarabun', size: 12 }
          },
          grid: {
            borderDash: [5, 5],
            color: 'rgba(0,0,0,0.05)',
            drawBorder: false
          },
          border: { display: false }
        },
        x: {
          ticks: {
            font: { family: 'Sarabun', size: 13, weight: 'bold' }
          },
          grid: { display: false },
          border: { display: false }
        }
      }
    }
  });
}
      function renderDistChart(chartData) {
        const ctx = document.getElementById('academicDistChart');
        if (!ctx || !chartData.hasData) return;

        DashboardController.charts.academicDist = new Chart(ctx, {
          type: 'doughnut',
          data: chartData,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '70%', // รูกว้างขึ้น
            layout: { padding: 10 },
            plugins: {
              legend: { position: 'right', labels: { usePointStyle: true, pointStyle: 'circle', font: { family: 'Sarabun' } } }
            },
            elements: { arc: { borderWidth: 0, hoverOffset: 10 } }
          }
        });
      }

      // --- 🚀 Initialization (Fast Mode) ---
      function initializeDashboard() {
        if (DashboardController.initializing) return;
        DashboardController.initializing = true;
        // console.log('🚀 Starting Fast Mode Dashboard...');

        waitForGAS(() => {
          // Step 1: Load Numbers IMMEDIATELY
          google.script.run.withSuccessHandler(data => {
            if(data) renderDashboardData(data);
          }).getFastStudentStats();

          // Step 2: Load Settings
          google.script.run.withSuccessHandler(settings => {
            renderSettings(settings);
          }).getGlobalSettings();

          // Step 3: Lazy Load Heavy Charts (Delay 1.2s)
          setTimeout(() => {
            // console.log('⏳ Loading charts...');
            loadAcademicData();
            loadCharts();
          }, 1200);

          DashboardController.initialized = true;
          DashboardController.initializing = false;
        });
      }

      // --- Event Listeners ---
      document.getElementById('refreshDashboard').addEventListener('click', function() {
        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        DashboardController.destroy();
        
        // Refresh logic
        initializeDashboard();
        
        setTimeout(() => {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> รีเฟรช';
        }, 1500);
      });

      document.getElementById('clearCache').addEventListener('click', function() {
        if(!confirm('ต้องการล้าง Cache หรือไม่?')) return;
        const btn = this;
        btn.disabled = true;
        btn.innerHTML = '...';
        google.script.run.withSuccessHandler(msg => {
          alert(msg);
          document.getElementById('refreshDashboard').click();
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-trash"></i> ล้าง Cache';
        }).clearServerCache();
      });

      // Start App
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initializeDashboard);
      else initializeDashboard();

    })();
  </script>
</body>
</html>
