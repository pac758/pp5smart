<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เปลี่ยนรหัสผ่าน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; padding: 20px; }
    .card { max-width: 520px; margin: 48px auto; box-shadow: 0 4px 16px rgba(0,0,0,.08); border: 0; }
    .card-header { display: flex; align-items: center; gap: .5rem; }
    .spinner { display: none; }
    .is-loading .spinner { display: inline-block; }
    .is-loading .btn-submit { pointer-events: none; opacity: .7; }
    .pw-meter { height: 6px; border-radius: 999px; background: #e9ecef; overflow: hidden; }
    .pw-meter > div { height: 100%; width: 0%; transition: width .3s ease; }
  </style>
</head>
<body>
  <div class="card" id="page">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0"><i class="bi bi-key me-1"></i> เปลี่ยนรหัสผ่าน</h4>
    </div>
    <div class="card-body">
      <div id="userBar" class="mb-3 small text-muted">
        <i class="bi bi-person-circle"></i> ผู้ใช้: <span id="usernameLabel">กำลังตรวจสอบ...</span>
      </div>

      <div id="guard" class="alert alert-warning d-none">
        <div class="d-flex align-items-start gap-2">
          <i class="bi bi-exclamation-triangle-fill fs-5"></i>
          <div>
            <div class="fw-semibold mb-1">ไม่พบผู้ใช้ / ยังไม่ได้เข้าสู่ระบบ</div>
            <div class="small text-muted">ระบบไม่พบชื่อผู้ใช้ใน session หรือ localStorage</div>
            <div class="mt-2 d-flex gap-2">
              <button class="btn btn-primary btn-sm" onclick="goLogin()"><i class="bi bi-box-arrow-in-right"></i> ไปหน้าเข้าสู่ระบบ</button>
              <button class="btn btn-outline-secondary btn-sm" onclick="retryIdentify()"><i class="bi bi-arrow-repeat"></i> ลองตรวจสอบอีกครั้ง</button>
            </div>
          </div>
        </div>
      </div>

      <form id="form" onsubmit="changePassword(); return false;" class="d-none">
        <div class="mb-3">
          <label class="form-label">รหัสผ่านเก่า</label>
          <input type="password" class="form-control" id="oldPassword" required autocomplete="current-password" />
        </div>
        <div class="mb-2">
          <label class="form-label">รหัสผ่านใหม่</label>
          <input type="password" class="form-control" id="newPassword" required minlength="6" autocomplete="new-password" oninput="updateMeter()" />
          <div class="pw-meter mt-2"><div id="meterFill" class="bg-secondary"></div></div>
          <small class="text-muted">อย่างน้อย 6 ตัวอักษร (แนะนำให้มีทั้ง ตัวพิมพ์เล็ก-ใหญ่ ตัวเลข และอักขระพิเศษ)</small>
        </div>
        <div class="mb-3">
          <label class="form-label">ยืนยันรหัสผ่านใหม่</label>
          <input type="password" class="form-control" id="confirmPassword" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-submit">
          <span class="spinner-border spinner spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          เปลี่ยนรหัสผ่าน
        </button>
      </form>

      <div id="message" class="mt-3"></div>
    </div>
  </div>
<script>
/** ========= Change Password (SPA-safe, idempotent) ========= */
(function () {
  // กัน init ซ้ำเมื่อหน้าเดิมถูกโหลดหลายรอบใน SPA
  if (window.CP && window.CP.__inited) return;

  // state global แบบไม่ประกาศซ้ำ
  window.cpState = window.cpState || { username: null, loginUrl: '?page=login' };

  // ---------- helpers ----------
  function setLoading(is) {
    var page = document.getElementById('page');
    if (page) page.classList.toggle('is-loading', !!is);
  }

  function showMessage(text, type) {
    var el = document.getElementById('message');
    if (el) el.innerHTML = '<div class="alert alert-' + type + '">' + text + '</div>';
  }

  function scorePassword(pw) {
    if (!pw) return 0;
    var s = 0;
    if (pw.length >= 6) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    if (pw.length >= 12) s++;
    return Math.min(s, 4);
  }

  function updateMeter() {
    var np = document.getElementById('newPassword');
    var fill = document.getElementById('meterFill');
    if (!np || !fill) return;
    var pct = Math.min(100, Math.round(scorePassword(np.value || '') * 25));
    fill.style.width = pct + '%';
    fill.className = '';
    if (pct < 25) fill.classList.add('bg-danger');
    else if (pct < 50) fill.classList.add('bg-warning');
    else if (pct < 75) fill.classList.add('bg-info');
    else fill.classList.add('bg-success');
  }

  // ---------- identify ----------
  function applyIdentifyUI(found) {
    var u = document.getElementById('usernameLabel');
    var form = document.getElementById('form');
    var guard = document.getElementById('guard');
    if (!u || !form || !guard) return;
    if (found) {
      u.textContent = cpState.username;
      form.classList.remove('d-none');
      guard.classList.add('d-none');
    } else {
      u.textContent = '—';
      form.classList.add('d-none');
      guard.classList.remove('d-none');
    }
  }

  function fallbackIdentify() {
    var localName = localStorage.getItem('username');
    cpState.username = localName || null;
    applyIdentifyUI(!!cpState.username);
  }

  function identifyUser() {
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      fallbackIdentify();
      return;
    }
    try {
      google.script.run
        .withSuccessHandler(function (res) {
          var serverName = res && (res.username || res.email || res.name) || null;
          var localName = localStorage.getItem('username');
          cpState.username = serverName || localName || null;
          applyIdentifyUI(!!cpState.username);
        })
        .withFailureHandler(function () { fallbackIdentify(); })
        .getCurrentUser();
    } catch (_) {
      fallbackIdentify();
    }
  }

  // ---------- actions ----------
  function changePassword() {
    var oldEl = document.getElementById('oldPassword');
    var newEl = document.getElementById('newPassword');
    var cfEl  = document.getElementById('confirmPassword');
    if (!oldEl || !newEl || !cfEl) return;

    var oldPassword = (oldEl.value || '').trim();
    var newPassword = (newEl.value || '').trim();
    var confirmPassword = (cfEl.value || '').trim();

    if (!cpState.username) {
      showMessage('ไม่พบผู้ใช้ในระบบ กรุณาเข้าสู่ระบบใหม่', 'warning');
      document.getElementById('guard')?.classList.remove('d-none');
      document.getElementById('form')?.classList.add('d-none');
      return;
    }
    if (newPassword !== confirmPassword) { showMessage('รหัสผ่านใหม่ไม่ตรงกัน', 'danger'); return; }
    if (newPassword.length < 6) { showMessage('รหัสผ่านใหม่ต้องยาวอย่างน้อย 6 ตัวอักษร', 'danger'); return; }
    if (oldPassword === newPassword) { showMessage('รหัสผ่านใหม่ต้องแตกต่างจากรหัสผ่านเดิม', 'danger'); return; }

    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      showMessage('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'danger');
      return;
    }

    setLoading(true);
    google.script.run
      .withSuccessHandler(function (result) {
        setLoading(false);
        if (result && result.success) {
          showMessage(result.message || 'เปลี่ยนรหัสผ่านสำเร็จ', 'success');
          oldEl.value = newEl.value = cfEl.value = '';
          updateMeter();
        } else {
          var msg = (result && result.message) || 'เปลี่ยนรหัสผ่านไม่สำเร็จ';
          showMessage(msg, 'danger');
          if (/ไม่พบผู้ใช้|not found/i.test(msg)) {
            document.getElementById('guard')?.classList.remove('d-none');
            document.getElementById('form')?.classList.add('d-none');
          }
        }
      })
      .withFailureHandler(function (error) {
        setLoading(false);
        showMessage('เกิดข้อผิดพลาด: ' + (error && error.message ? error.message : error), 'danger');
      })
      .changePassword(cpState.username, oldPassword, newPassword);
  }

  function retryIdentify() { identifyUser(); }
  function goLogin() {
    var base = location.origin + location.pathname;
    location.href = base + '?page=login';
  }

  // ---------- expose / init ----------
  window.CP = {
    __inited: true,
    identifyUser,
    fallbackIdentify,
    changePassword,
    retryIdentify,
    goLogin,
    updateMeter,
    setLoading,
    showMessage
  };

  // ให้ HTML เดิมที่เรียกชื่อฟังก์ชัน global ใช้งานได้ต่อ
  window.changePassword = CP.changePassword;
  window.retryIdentify  = CP.retryIdentify;
  window.goLogin        = CP.goLogin;
  window.updateMeter    = CP.updateMeter;

  // เริ่มทำงานทันที (ทั้ง standalone และเมื่อโหลดเป็น fragment)
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', identifyUser, { once: true });
  } else {
    identifyUser();
  }
})();
</script>

</body>
</html>
