<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>พิมพ์รายงาน ปพ.6 • PP5 Smart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    :root{
      --primary:#6366f1; --primary-2:#818cf8; --primary-3:#a78bfa;
      --accent:#10b981; --accent-light:rgba(16,185,129,.08);
      --boy:#3b82f6; --girl:#ec4899;
      --danger:#ef4444; --warning:#f59e0b;
      --text:#1e293b; --text-2:#475569; --text-3:#94a3b8;
      --bg:#f1f5f9; --surface:#fff; --surface-2:#f8fafc;
      --border:rgba(15,23,42,.08); --border-2:rgba(15,23,42,.12);
      --shadow-xs:0 1px 2px rgba(0,0,0,.04);
      --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
      --shadow-md:0 4px 6px -1px rgba(0,0,0,.06),0 2px 4px rgba(0,0,0,.04);
      --shadow-lg:0 10px 15px -3px rgba(0,0,0,.07),0 4px 6px rgba(0,0,0,.04);
      --shadow-xl:0 20px 25px -5px rgba(0,0,0,.08),0 8px 10px rgba(0,0,0,.04);
      --r-xs:8px; --r-sm:12px; --r-md:16px; --r-lg:20px; --r-xl:24px;
    }
    html,body{height:100%;margin:0}
    body{
      font-family:"Noto Sans Thai",system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text); background:var(--bg);
      -webkit-font-smoothing:antialiased;
      padding-bottom:0;
    }
    body.has-fab{padding-bottom:64px}

    .page-wrap{max-width:680px;margin:0 auto;padding:20px 16px 30px}

    /* ── Header ── */
    .page-header{
      display:flex;align-items:center;gap:14px;
      margin-bottom:20px;padding:0 2px;
    }
    .header-icon{
      width:48px;height:48px;border-radius:var(--r-sm);
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--primary),var(--primary-3));
      color:#fff;font-size:1.25rem;flex-shrink:0;
      box-shadow:0 4px 12px rgba(99,102,241,.25);
    }
    .header-text h1{margin:0;font-size:1.2rem;font-weight:700;color:var(--text);letter-spacing:-.3px}
    .header-text p{margin:2px 0 0;font-size:.82rem;color:var(--text-3);font-weight:400}

    /* ── Cards ── */
    .step-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r-lg);box-shadow:var(--shadow-sm);
      margin-bottom:14px;overflow:hidden;
      transition:box-shadow .2s;
    }
    .step-card:hover{box-shadow:var(--shadow-md)}
    .step-header{
      display:flex;align-items:center;gap:10px;
      padding:14px 18px;border-bottom:1px solid var(--border);
      background:var(--surface-2);
    }
    .step-num{
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
    }
    .step-title{font-size:.9rem;font-weight:600;color:var(--text)}
    .step-body{padding:16px 18px}

    /* ── Quick-select chips ── */
    .chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
    .chip{
      display:inline-flex;align-items:center;gap:4px;
      padding:7px 14px;border-radius:999px;
      font-size:.8rem;font-weight:600;cursor:pointer;
      border:1.5px solid var(--border-2);color:var(--text-2);
      background:var(--surface);transition:all .15s;
      user-select:none;white-space:nowrap;
    }
    .chip:hover{border-color:var(--primary);color:var(--primary);background:rgba(99,102,241,.04)}
    .chip.active{
      border-color:var(--primary);color:#fff;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      box-shadow:0 2px 8px rgba(99,102,241,.25);
    }

    .teacher-info-box{
      display:none;align-items:center;gap:10px;
      padding:10px 14px;border-radius:var(--r-sm);
      background:linear-gradient(135deg,rgba(99,102,241,.06),rgba(167,139,250,.06));
      border:1px solid rgba(99,102,241,.15);
      margin-top:14px;
    }
    .teacher-info-box .ti-icon{
      width:32px;height:32px;border-radius:var(--r-xs);
      display:flex;align-items:center;justify-content:center;
      background:rgba(99,102,241,.1);color:var(--primary);font-size:.9rem;flex-shrink:0;
    }
    .teacher-info-box .ti-text{font-size:.85rem;color:var(--text-2)}
    .teacher-info-box .ti-text strong{color:var(--text);font-weight:600}

    /* ── Search + Toolbar ── */
    .search-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    .search-box{position:relative;flex:1}
    .search-box input{
      width:100%;padding:9px 14px 9px 36px;border-radius:var(--r-sm);
      border:1.5px solid var(--border-2);font-size:.85rem;color:var(--text);
      background:var(--surface);transition:border-color .15s;
    }
    .search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
    .search-box input::placeholder{color:var(--text-3)}
    .search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:.85rem;pointer-events:none}

    .tool-btn{
      display:flex;align-items:center;justify-content:center;gap:5px;
      padding:9px 14px;border-radius:var(--r-sm);border:1.5px solid var(--border-2);
      background:var(--surface);color:var(--text-2);font-size:.8rem;font-weight:600;
      cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;
    }
    .tool-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(99,102,241,.04)}
    .tool-btn.active{border-color:var(--primary);color:var(--primary);background:rgba(99,102,241,.06)}
    .tool-btn i{font-size:.78rem}

    /* ── Student Grid ── */
    .student-grid{
      display:grid;grid-template-columns:1fr;gap:6px;
      max-height:400px;overflow-y:auto;
      padding:2px;
    }
    .student-grid::-webkit-scrollbar{width:5px}
    .student-grid::-webkit-scrollbar-thumb{background:rgba(100,116,139,.18);border-radius:999px}
    .student-grid::-webkit-scrollbar-thumb:hover{background:rgba(100,116,139,.3)}

    .student-card{
      display:flex;align-items:center;gap:12px;
      padding:10px 14px;border-radius:var(--r-sm);
      border:1.5px solid var(--border);
      background:var(--surface);cursor:pointer;
      transition:all .15s;position:relative;
      user-select:none;
    }
    .student-card:hover{border-color:rgba(99,102,241,.25);background:rgba(99,102,241,.02)}
    .student-card.is-checked{
      border-color:var(--primary);
      background:rgba(99,102,241,.04);
    }
    .student-card.is-checked .sc-check{
      opacity:1;transform:scale(1);
    }
    .student-card input[type="checkbox"]{display:none}

    .sc-avatar{
      width:38px;height:38px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.82rem;font-weight:700;flex-shrink:0;
      color:#fff;position:relative;
    }
    .sc-avatar.boy{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
    .sc-avatar.girl{background:linear-gradient(135deg,#f472b6,#ec4899)}

    .sc-check{
      position:absolute;bottom:-2px;right:-2px;
      width:18px;height:18px;border-radius:50%;
      background:var(--primary);color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:.6rem;border:2px solid var(--surface);
      opacity:0;transform:scale(.5);
      transition:all .15s;
    }

    .sc-info{flex:1;min-width:0}
    .sc-name{font-size:.88rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sc-id{font-size:.72rem;color:var(--text-3);font-weight:500}

    .sc-num{
      font-size:.72rem;font-weight:700;color:var(--text-3);
      width:24px;height:24px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      background:rgba(15,23,42,.04);flex-shrink:0;
    }
    .student-card.is-checked .sc-num{
      background:rgba(99,102,241,.1);color:var(--primary);
    }

    .empty-state{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:48px 20px;color:var(--text-3);gap:10px;
    }
    .empty-state i{font-size:2.5rem;opacity:.3}
    .empty-state span{font-size:.85rem}

    /* ── Floating Action Bar ── */
    .fab-bar{
      position:fixed;bottom:16px;right:16px;
      transform:translateY(calc(100% + 40px));
      transition:transform .3s cubic-bezier(.4,0,.2,1);
      z-index:100;pointer-events:none;
    }
    .fab-bar.visible{transform:translateY(0)}
    .fab-inner{
      padding:8px 12px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      box-shadow:var(--shadow-xl);
      display:flex;align-items:center;gap:8px;
      pointer-events:auto;
    }
    .fab-count{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:24px;height:24px;padding:0 7px;border-radius:999px;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      color:#fff;font-size:.78rem;font-weight:700;flex-shrink:0;
    }
    .fab-sep{width:1px;height:20px;background:var(--border-2);flex-shrink:0}
    .fab-deselect{
      padding:4px 8px;border-radius:var(--r-xs);border:none;
      background:none;color:var(--text-3);
      font-size:.72rem;font-weight:600;cursor:pointer;
      transition:all .12s;flex-shrink:0;
    }
    .fab-deselect:hover{color:var(--danger)}
    .fab-toggle{
      display:flex;align-items:center;
      flex-shrink:0;
    }
    .toggle-switch{position:relative;width:40px;height:22px;flex-shrink:0}
    .toggle-switch input{opacity:0;width:0;height:0}
    .toggle-switch .slider{
      position:absolute;inset:0;border-radius:999px;cursor:pointer;
      background:rgba(15,23,42,.15);transition:background .2s;
    }
    .toggle-switch .slider::before{
      content:'';position:absolute;width:16px;height:16px;
      left:3px;top:3px;border-radius:50%;background:#fff;
      box-shadow:var(--shadow-xs);transition:transform .2s;
    }
    .toggle-switch input:checked+.slider{background:var(--primary)}
    .toggle-switch input:checked+.slider::before{transform:translateX(18px)}

    #generateBtn{
      padding:8px 14px;border:0;border-radius:var(--r-sm);flex-shrink:0;
      font-size:.9rem;font-weight:700;color:#fff;cursor:pointer;
      background:linear-gradient(135deg,var(--primary),var(--primary-2));
      box-shadow:0 4px 14px rgba(99,102,241,.3);
      transition:transform .1s,box-shadow .2s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    #generateBtn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.35)}
    #generateBtn:active:not(:disabled){transform:translateY(0)}
    #generateBtn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
    #generateBtn.loading .spinner-border{display:inline-block}
    .spinner-border{display:none}

    /* ── Progress Card ── */
    .progress-card{
      display:none;
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r-lg);box-shadow:var(--shadow-sm);
      margin-bottom:14px;overflow:hidden;
    }
    .progress-card-header{
      display:flex;align-items:center;gap:10px;
      padding:14px 18px;border-bottom:1px solid var(--border);
      background:var(--surface-2);
    }
    .progress-card-header .pch-icon{
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.7rem;color:#fff;flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),#059669);
    }
    .progress-card-header .pch-title{font-size:.9rem;font-weight:600;color:var(--text)}
    .progress-card-body{padding:16px 18px}

    .progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .progress-header .ph-text{font-size:.82rem;font-weight:500;color:var(--text-2)}
    .progress-header .ph-pct{font-size:.82rem;font-weight:700;color:var(--primary)}
    .progress-track{
      width:100%;height:8px;border-radius:999px;
      background:rgba(99,102,241,.1);overflow:hidden;
    }
    .progress-fill{
      height:100%;border-radius:999px;width:0%;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      transition:width .3s ease;
    }
    .progress-fill.animated{animation:progress-pulse 1.5s ease-in-out infinite}
    @keyframes progress-pulse{0%,100%{opacity:1}50%{opacity:.7}}

    .result-list{
      margin-top:12px;border-radius:var(--r-sm);
      border:1px solid var(--border);overflow:hidden;
      max-height:300px;overflow-y:auto;background:var(--surface);
    }
    .result-list::-webkit-scrollbar{width:5px}
    .result-list::-webkit-scrollbar-thumb{background:rgba(100,116,139,.18);border-radius:999px}

    .result-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 14px;border-bottom:1px solid var(--border);
      transition:background .12s;gap:8px;
    }
    .result-item:last-child{border-bottom:none}
    .result-item:hover{background:var(--surface-2)}
    .result-item .ri-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
    .result-item .ri-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
    .result-item .ri-icon.success{background:rgba(16,185,129,.1);color:var(--accent)}
    .result-item .ri-icon.error{background:rgba(239,68,68,.1);color:var(--danger)}
    .result-item .ri-name{font-size:.82rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .result-item .ri-error{font-size:.72rem;color:var(--danger);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .result-item .ri-btn{
      display:inline-flex;align-items:center;gap:5px;
      padding:6px 12px;border-radius:var(--r-xs);
      font-size:.75rem;font-weight:600;text-decoration:none;
      color:var(--danger);background:rgba(239,68,68,.06);
      border:1px solid rgba(239,68,68,.15);
      transition:all .15s;white-space:nowrap;flex-shrink:0;
    }
    .result-item .ri-btn:hover{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.25)}

    /* ── Status area ── */
    .status-msg{
      padding:10px 14px;border-radius:var(--r-sm);
      font-size:.82rem;font-weight:500;margin-top:12px;
      display:flex;align-items:center;gap:8px;
    }
    .status-msg.info{background:rgba(99,102,241,.06);color:var(--primary);border:1px solid rgba(99,102,241,.12)}
    .status-msg.success{background:rgba(16,185,129,.06);color:#059669;border:1px solid rgba(16,185,129,.12)}
    .status-msg.danger{background:rgba(239,68,68,.06);color:var(--danger);border:1px solid rgba(239,68,68,.12)}

    /* ── Responsive ── */
    @media(max-width:600px){
      .page-wrap{padding:14px 10px 20px}
      .step-body{padding:14px}
      .chips-row{gap:6px}
      .chip{padding:6px 11px;font-size:.75rem}
      .fab-inner{padding:6px 10px;gap:6px}
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <!-- Header -->
    <div class="page-header">
      <div class="header-icon"><i class="fa-solid fa-file-lines"></i></div>
      <div class="header-text">
        <h1>พิมพ์รายงาน ปพ.6</h1>
        <p>สร้างรายงานผลพัฒนาคุณภาพผู้เรียนรายบุคคล (PDF)</p>
      </div>
    </div>

    <!-- Step 1: เลือกชั้น/ห้อง -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">เลือกชั้นเรียน</div>
      </div>
      <div class="step-body">
        <div id="quickChips" class="chips-row"></div>
        <div id="teacherInfoBox" class="teacher-info-box">
          <div class="ti-icon"><i class="fa-solid fa-chalkboard-user"></i></div>
          <div class="ti-text">ครูประจำชั้น: <strong id="teacherNameDisplay">-</strong></div>
        </div>
      </div>
    </div>

    <!-- Step 2: เลือกนักเรียนและพิมพ์ -->
    <div class="step-card">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">เลือกนักเรียนและพิมพ์</div>
      </div>
      <div class="step-body">
        <div class="search-toolbar">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="studentSearch" placeholder="ค้นหาชื่อ / รหัส..." disabled>
          </div>
          <div class="tool-btn" id="selectAllBtn" title="เลือกทั้งหมด">
            <i class="fa-solid fa-check-double"></i> ทั้งหมด
          </div>
        </div>
        <div class="student-grid" id="studentListBody">
          <div class="empty-state">
            <i class="fa-solid fa-users"></i>
            <span>เลือกชั้น/ห้องเพื่อแสดงรายชื่อ</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Progress Card (shown during generation) -->
    <div class="progress-card" id="progressContainer">
      <div class="progress-card-header">
        <div class="pch-icon"><i class="fa-solid fa-gear fa-spin"></i></div>
        <div class="pch-title" id="progressCardTitle">กำลังสร้างรายงาน...</div>
      </div>
      <div class="progress-card-body">
        <div class="progress-header">
          <span class="ph-text" id="progressText">กำลังเตรียมข้อมูล...</span>
          <span class="ph-pct" id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill animated" id="progressBar"></div>
        </div>
        <div class="result-list" id="resultLinks"></div>
      </div>
    </div>

    <div id="statusArea"></div>
  </div>

  <!-- Floating Action Bar -->
  <div class="fab-bar" id="fabBar">
    <div class="fab-inner">
      <div class="fab-count" id="fabCount">0</div>
      <button class="fab-deselect" id="fabDeselect" title="ยกเลิกทั้งหมด"><i class="fa-solid fa-xmark"></i></button>
      <div class="fab-sep"></div>
      <div class="fab-toggle" title="แสดงอันดับ">
        <label class="toggle-switch">
          <input type="checkbox" id="showRankToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <button id="generateBtn" disabled>
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <i class="fa-solid fa-print"></i>
        <span class="btn-label">พิมพ์</span>
      </button>
    </div>
  </div>

<script>
(function() {
  'use strict';

  var el = {
    studentListBody: document.getElementById('studentListBody'),
    selectAllBtn: document.getElementById('selectAllBtn'),
    generateBtn: document.getElementById('generateBtn'),
    statusArea: document.getElementById('statusArea'),
    progressContainer: document.getElementById('progressContainer'),
    progressBar: document.getElementById('progressBar'),
    progressText: document.getElementById('progressText'),
    progressPercent: document.getElementById('progressPercent'),
    progressCardTitle: document.getElementById('progressCardTitle'),
    resultLinks: document.getElementById('resultLinks'),
    teacherInfoBox: document.getElementById('teacherInfoBox'),
    teacherNameDisplay: document.getElementById('teacherNameDisplay'),
    showRankToggle: document.getElementById('showRankToggle'),
    quickChips: document.getElementById('quickChips'),
    studentSearch: document.getElementById('studentSearch'),
    fabBar: document.getElementById('fabBar'),
    fabCount: document.getElementById('fabCount'),
    fabDeselect: document.getElementById('fabDeselect')
  };

  var allSelected = false;
  var dataCache = { allStudents: null, currentGrade: null, currentClass: null };
  var batchQueue = [], batchTotal = 0, batchSuccess = 0, batchFail = 0, lastSuccessUrl = '';

  // --- Helper ---
  function showStatus(msg, type) {
    type = type || 'info';
    el.statusArea.innerHTML = '<div class="status-msg ' + type + '">' + msg + '</div>';
  }

  function base64ToBlobUrl_(base64, mimeType) {
    var clean = String(base64 || '').replace(/\s/g, '');
    var binary = atob(clean);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    var blob = new Blob([bytes], { type: mimeType || 'application/pdf' });
    return URL.createObjectURL(blob);
  }

  function getGender(name) {
    if (!name) return 'boy';
    if (name.indexOf('หญิง') !== -1 || name.indexOf('นางสาว') !== -1 || name.indexOf('น.ส.') !== -1) return 'girl';
    return 'boy';
  }

  function getInitials(name) {
    if (!name) return '?';
    var clean = name.replace(/^(เด็ก(?:ชาย|หญิง)|นาย|นาง(?:สาว)?|น\.ส\.)\s*/i, '');
    return clean.charAt(0) || '?';
  }

  // --- Quick Chips ---
  function buildQuickChips() {
    if (!dataCache.allStudents) return;
    el.quickChips.innerHTML = '';
    var grades = Object.keys(dataCache.allStudents).sort();
    var frag = document.createDocumentFragment();
    grades.forEach(function(g) {
      if (/^อ\.\d/.test(g)) return;
      var classes = Object.keys(dataCache.allStudents[g]).sort();
      classes.forEach(function(c) {
        var chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = g + '/' + c;
        chip.dataset.grade = g;
        chip.dataset.class = c;
        chip.onclick = function() { selectGradeClass(g, c); };
        frag.appendChild(chip);
      });
    });
    el.quickChips.appendChild(frag);
  }

  function highlightChip(grade, cls) {
    el.quickChips.querySelectorAll('.chip').forEach(function(ch) {
      ch.classList.toggle('active', ch.dataset.grade === grade && ch.dataset.class === cls);
    });
  }

  function selectGradeClass(grade, cls) {
    dataCache.currentGrade = grade;
    dataCache.currentClass = cls;
    highlightChip(grade, cls);

    el.studentSearch.value = '';
    allSelected = false;
    el.selectAllBtn.classList.remove('active');

    var students = dataCache.allStudents[grade] && dataCache.allStudents[grade][cls];
    renderStudentList(students);

    el.teacherInfoBox.style.display = 'flex';
    el.teacherNameDisplay.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="font-size:.75rem"></i> กำลังโหลด...';
    google.script.run
      .withSuccessHandler(function(name) {
        el.teacherNameDisplay.textContent = name || 'ไม่พบข้อมูล';
      })
      .withFailureHandler(function() {
        el.teacherNameDisplay.textContent = 'ไม่พบข้อมูล';
      })
      .getHomeroomTeacher(grade, cls);
  }

  // --- Search Filter ---
  el.studentSearch.addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    document.querySelectorAll('.student-card').forEach(function(card) {
      var text = card.textContent.toLowerCase();
      card.style.display = !q || text.indexOf(q) !== -1 ? '' : 'none';
    });
  });

  // --- Select All Button ---
  el.selectAllBtn.addEventListener('click', function() {
    allSelected = !allSelected;
    var cbs = document.querySelectorAll('.student-checkbox');
    cbs.forEach(function(cb) {
      var card = cb.closest('.student-card');
      if (!card || card.style.display !== 'none') cb.checked = allSelected;
    });
    el.selectAllBtn.classList.toggle('active', allSelected);
    updateSelectedCount();
  });

  // --- Deselect all ---
  el.fabDeselect.addEventListener('click', function() {
    document.querySelectorAll('.student-checkbox').forEach(function(cb) { cb.checked = false; });
    allSelected = false;
    el.selectAllBtn.classList.remove('active');
    updateSelectedCount();
  });

  // --- Core Logic ---
  function loadAllData() {
    showStatus('<i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...', 'info');
    google.script.run
      .withSuccessHandler(function(data) {
        dataCache.allStudents = data;
        buildQuickChips();
        el.studentSearch.disabled = false;
        showStatus('<i class="fa-solid fa-circle-check"></i> พร้อมใช้งาน', 'success');
      })
      .withFailureHandler(function(err) { showStatus('<i class="fa-solid fa-circle-xmark"></i> โหลดข้อมูลล้มเหลว: ' + err.message, 'danger'); })
      .getAllStudentDataOptimized();
  }

  function renderStudentList(students) {
    el.studentListBody.innerHTML = '';
    if (!students || students.length === 0) {
      el.studentListBody.innerHTML = '<div class="empty-state"><i class="fa-solid fa-user-slash"></i><span>ไม่พบนักเรียน</span></div>';
      return;
    }

    var fragment = document.createDocumentFragment();
    students.forEach(function(s, idx) {
      var card = document.createElement('div');
      card.className = 'student-card';
      card.onclick = function(e) {
        if (e.target.type === 'checkbox') return;
        var cb = card.querySelector('input');
        cb.checked = !cb.checked;
        updateSelectedCount();
      };

      var gender = getGender(s.fullName);
      var initials = getInitials(s.fullName);

      card.innerHTML =
        '<input type="checkbox" class="student-checkbox" value="' + s.id + '" data-name="' + s.fullName.replace(/"/g, '&quot;') + '">' +
        '<div class="sc-avatar ' + gender + '">' +
          initials +
          '<div class="sc-check"><i class="fa-solid fa-check"></i></div>' +
        '</div>' +
        '<div class="sc-info">' +
          '<div class="sc-name">' + s.fullName + '</div>' +
          '<div class="sc-id">รหัส ' + s.id + '</div>' +
        '</div>' +
        '<div class="sc-num">' + (idx + 1) + '</div>';

      var cb = card.querySelector('input');
      cb.onchange = updateSelectedCount;

      fragment.appendChild(card);
    });
    el.studentListBody.appendChild(fragment);
    updateSelectedCount();
  }

  function updateSelectedCount() {
    var checked = document.querySelectorAll('.student-checkbox:checked');
    var count = checked.length;

    // Update FAB
    var fabVisible = count > 0;
    el.fabBar.classList.toggle('visible', fabVisible);
    document.body.classList.toggle('has-fab', fabVisible);
    el.fabCount.textContent = count;

    var btnLabel = el.generateBtn.querySelector('.btn-label');
    btnLabel.textContent = count > 0 ? 'พิมพ์ ' + count + ' รายงาน' : 'พิมพ์รายงาน';
    el.generateBtn.disabled = count === 0;

    document.querySelectorAll('.student-checkbox').forEach(function(cb) {
      var card = cb.closest('.student-card');
      if (card) card.classList.toggle('is-checked', cb.checked);
    });
  }

  // --- Batch Process ---
  el.generateBtn.addEventListener('click', function() {
    var checkedBoxes = document.querySelectorAll('.student-checkbox:checked');
    if (checkedBoxes.length === 0) return;

    batchQueue = Array.from(checkedBoxes).map(function(cb) { return { id: cb.value, name: cb.dataset.name }; });
    batchTotal = batchQueue.length;
    batchSuccess = 0;
    batchFail = 0;
    lastSuccessUrl = '';

    el.generateBtn.disabled = true;
    el.generateBtn.classList.add('loading');
    el.progressContainer.style.display = 'block';
    el.progressBar.style.width = '0%';
    el.progressBar.classList.add('animated');
    el.progressCardTitle.textContent = 'กำลังสร้างรายงาน (' + batchTotal + ' คน)...';
    el.progressText.textContent = 'กำลังเตรียมข้อมูล...';
    el.progressPercent.textContent = '0%';
    el.resultLinks.innerHTML = '';

    el.progressContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    updateProgress();
    processNext();
  });

  function processNext() {
    if (batchQueue.length === 0) {
      finishBatch();
      return;
    }

    var current = batchQueue.shift();
    var currentNum = batchTotal - batchQueue.length;
    el.progressText.textContent = '(' + currentNum + '/' + batchTotal + ') ' + current.name;

    google.script.run
      .withSuccessHandler(function(res) {
        try {
          if (res && res.mode === 'url' && res.url) {
            batchSuccess++;
            addLink(current.name, res.url, true);
            lastSuccessUrl = res.url;
          } else if (res && res.mode === 'base64' && res.base64) {
            var url = base64ToBlobUrl_(res.base64, res.mimeType);
            batchSuccess++;
            addLink(current.name, url, true);
            lastSuccessUrl = url;
          } else if (typeof res === 'string' && res.startsWith('http')) {
            batchSuccess++;
            addLink(current.name, res, true);
            lastSuccessUrl = res;
          } else {
            batchFail++;
            addLink(current.name, null, false, 'รูปแบบผลลัพธ์ไม่ถูกต้อง');
          }
        } finally {
          updateProgress();
          processNext();
        }
      })
      .withFailureHandler(function(err) {
        batchFail++;
        addLink(current.name, null, false, err && err.message ? err.message : String(err));
        updateProgress();
        processNext();
      })
      .generateStudentReportPdfUnified(current.id, { term: 'both', showRank: el.showRankToggle.checked });
  }

  function updateProgress() {
    var done = batchSuccess + batchFail;
    var pct = Math.round((done / batchTotal) * 100);
    el.progressBar.style.width = pct + '%';
    el.progressPercent.textContent = pct + '%';
  }

  function addLink(name, url, success, errorMsg) {
    errorMsg = errorMsg || '';
    var div = document.createElement('div');
    div.className = 'result-item';

    if (success) {
      lastSuccessUrl = url;
      div.innerHTML =
        '<div class="ri-left">' +
          '<div class="ri-icon success"><i class="fa-solid fa-check"></i></div>' +
          '<span class="ri-name">' + name + '</span>' +
        '</div>' +
        '<a href="' + url + '" target="_blank" class="ri-btn">' +
          '<i class="fa-solid fa-file-pdf"></i> เปิด' +
        '</a>';
    } else {
      div.innerHTML =
        '<div class="ri-left">' +
          '<div class="ri-icon error"><i class="fa-solid fa-xmark"></i></div>' +
          '<div style="min-width:0">' +
            '<div class="ri-name">' + name + '</div>' +
            '<div class="ri-error">' + errorMsg + '</div>' +
          '</div>' +
        '</div>';
    }
    el.resultLinks.prepend(div);
  }

  function finishBatch() {
    el.progressText.textContent = 'สำเร็จ ' + batchSuccess + ' / ผิดพลาด ' + batchFail;
    el.progressCardTitle.textContent = 'เสร็จสิ้น!';
    var iconEl = el.progressContainer.querySelector('.pch-icon');
    if (iconEl) iconEl.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
    el.progressBar.classList.remove('animated');
    el.generateBtn.disabled = false;
    el.generateBtn.classList.remove('loading');
    if (batchSuccess > 0 && lastSuccessUrl) {
      window.open(lastSuccessUrl, '_blank');
    }
  }

  // --- Init ---
  loadAllData();

})();
</script>
</body>
</html>
