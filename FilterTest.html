<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทดสอบการกรองชั้นเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 2rem; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <h1 class="mb-4">ทดสอบการกรองระดับชั้น</h1>
        <p class="text-muted">หน้านี้จะทดสอบฟังก์ชัน `getGradeList()` จาก Server โดยตรง หาก Dropdown ด้านล่างมีข้อมูลระดับชั้นให้เลือก แสดงว่าระบบพื้นฐานทำงานถูกต้อง</p>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="mb-3">
                    <label for="gradeSelectTest" class="form-label fw-bold">ระดับชั้น:</label>
                    <select id="gradeSelectTest" class="form-select form-select-lg">
                        <option value="">-- กรุณารอสักครู่ --</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div id="status" class="mt-3"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gradeSelect = document.getElementById('gradeSelectTest');
            const statusDiv = document.getElementById('status');
            
            gradeSelect.innerHTML = '<option value="">🔄 กำลังโหลดข้อมูลระดับชั้น...</option>';
            statusDiv.innerHTML = '<div class="alert alert-info">กำลังเชื่อมต่อกับ Server...</div>';

            google.script.run
                .withSuccessHandler(grades => {
                    gradeSelect.innerHTML = '<option value="">-- กรุณาเลือกระดับชั้น --</option>';
                    
                    if (grades && grades.length > 0) {
                        grades.forEach(grade => {
                            const option = document.createElement('option');
                            option.value = grade;
                            option.textContent = `ระดับชั้น ${grade}`;
                            gradeSelect.appendChild(option);
                        });
                        statusDiv.innerHTML = `<div class="alert alert-success">✅ โหลดข้อมูลสำเร็จ! พบ ${grades.length} ระดับชั้น</div>`;
                    } else {
                        gradeSelect.innerHTML = '<option value="">❌ ไม่พบข้อมูลระดับชั้น</option>';
                        statusDiv.innerHTML = '<div class="alert alert-warning">ไม่พบข้อมูลระดับชั้นในชีต "Students"</div>';
                    }
                })
                .withFailureHandler(error => {
                    console.error("Error loading grades:", error);
                    gradeSelect.innerHTML = '<option value="">❌ เกิดข้อผิดพลาด</option>';
                    statusDiv.innerHTML = `<div class="alert alert-danger">เกิดข้อผิดพลาด: ${error.message}</div>`;
                })
                .getGradeList(); // <== เรียกใช้ฟังก์ชันใหม่
        });
    </script>
</body>
</html>
