  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f9f9f9; }
    
    /* Animation สำหรับ cards */
    .stat-card {
      transition: all 0.3s ease;
      border: none;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    
    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    
    .stat-card .card-body {
      position: relative;
      z-index: 2;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      z-index: 1;
    }
    
    /* Gradient backgrounds สำหรับ stat cards */
    .stat-present {
      background: linear-gradient(135deg, #28a745, #20c997);
      color: white;
    }
    
    .stat-leave {
      background: linear-gradient(135deg, #ffc107, #fd7e14);
      color: white;
    }
    
    .stat-absent {
      background: linear-gradient(135deg, #dc3545, #e83e8c);
      color: white;
    }
    
    .stat-percentage {
      background: linear-gradient(135deg, #007bff, #6f42c1);
      color: white;
    }
    
    /* ปรับปรุงตาราง */
    .modern-table {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    
.modern-table thead th {
  background: linear-gradient(135deg, #f8f9fa, #e9ecef); /* เปลี่ยนเป็นขาว-เทาอ่อน */
  color: #495057; /* เปลี่ยนตัวอักษรเป็นสีเข้ม */
  border: none;
  font-weight: 600;
  padding: 15px 10px;
}
    
    .modern-table tbody tr {
      transition: all 0.2s ease;
    }
    
    .modern-table tbody tr:hover {
      background-color: #f8f9fa;
      transform: scale(1.01);
    }
    
    .modern-table td {
      padding: 12px 10px;
      vertical-align: middle;
      border-color: #e9ecef;
    }
    
    /* ปรับปรุง badges */
    .modern-badge {
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 500;
    }
    
    /* Loading animation */
    .loading-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Chart container */
    .chart-container {
      position: relative;
      height: 300px;
      margin: 20px 0;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    
    /* Progress bars */
    .progress-modern {
      height: 8px;
      border-radius: 10px;
      background: #e9ecef;
      overflow: hidden;
    }
    
    .progress-bar-modern {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
    }
    
    /* แก้ไข header */
    .header-main { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      color: #fff; 
      padding: 32px 0 24px 0; 
      text-align: center; 
      border-radius: 0 0 2rem 2rem; 
      margin-bottom: 36px; 
      box-shadow: 0 4px 20px rgba(102,126,234,0.14);
      position: relative;
      overflow: hidden;
    }
    
    .header-main::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.05) 2px,
        rgba(255,255,255,0.05) 4px
      );
      animation: move 20s linear infinite;
    }
    
    @keyframes move {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    .header-main h2 { font-weight: 800; letter-spacing: 1px; margin-bottom: 8px; position: relative; z-index: 2; }
    .header-main p { font-weight: 400; color: #e0e7ff; margin-bottom: 0; position: relative; z-index: 2; }
    .result-table { background: #fff; border-radius: 14px; box-shadow: 0 2px 10px rgba(51,65,85,0.09);}
    .table-summary th, .table-summary td { text-align: center; vertical-align: middle; }
    .table-summary th { background: #eef2ff; }
    .spinner-border { margin-right: 10px; }
    .export-btn-area { text-align: right; margin-bottom: 8px; }
    
    /* Tooltip สำหรับ month input */
    #monthSelect {
      position: relative;
    }

    #monthSelect:hover::after {
      content: attr(title);
      position: absolute;
      bottom: 100%;
      left: 0;
      background: rgba(0,0,0,0.8);

    }

    /* ===== CSS เพิ่มเติมสำหรับสรุปรายเดือน ===== */

/* ส่วนสถิติรายเดือน */

/* ===== [ใหม่] Loading Overlay ===== */
.loading-overlay {

    left: 0;
    width: 100%;

    background: rgba(255, 255, 255, 0.8); /* พื้นหลังโปร่งแสงสีขาว */

    flex-direction: column;
    align-items: center;

}

/* อนิเมชันแบบจุดกระพริบ */

@keyframes pulse {

.loading-overlay p {

/* Loading Indicator ตรงกลาง */

}

  <script>
  // ===== ฟังก์ชันหาปีการศึกษาปัจจุบัน =====
  function getCurrentAcademicYear() {
    const today = new Date();
    const currentYear = today.getFullYear() + 543; // แปลงเป็น พ.ศ.
    const currentMonth = today.getMonth() + 1; // เดือน 1-12
    
    // ถ้าเดือนมกราคม-เมษายน = ปีการศึกษาปีก่อน
    // ถ้าเดือนพฤษภาคม-ธันวาคม = ปีการศึกษาปีนั้น
    if (currentMonth >= 1 && currentMonth <= 4) {
      return currentYear - 1; // ปีการศึกษาปีก่อน
    } else {
      return currentYear; // ปีการศึกษาปีนั้น
    }
  }

  // ===== ฟังก์ชันแปลงเลขเดือนเป็นชื่อไทย =====
  function getThaiMonthName(monthNumber) {
    const thaiMonths = [
      '', 'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'
    ];
    return thaiMonths[monthNumber] || '';
  }

  // ===== UI ส่วนปีการศึกษา (เริ่มที่ 2568 ไปข้างหน้า 10 ปี) =====
  function fillYearSelect() {
    const yearSel = document.getElementById('yearSelect');
    yearSel.innerHTML = '';
    
    const currentAcademicYear = getCurrentAcademicYear();
    const startYear = 2568; // ปีเริ่มต้นของระบบ
    const endYear = startYear + 10; // ไปข้างหน้า 10 ปี (2568-2578)
    
    // สร้างตัวเลือกจาก 2568 ถึง 2578
    for (let year = startYear; year <= endYear; year++) {
      const opt = document.createElement('option');
      opt.value = year;
      opt.textContent = year;
      yearSel.appendChild(opt);
    }
    
    // ตั้งค่าเริ่มต้นเป็นปีการศึกษาปัจจุบัน (ถ้าอยู่ในช่วง)
    if (currentAcademicYear >= startYear && currentAcademicYear <= endYear) {
      yearSel.value = currentAcademicYear;
    } else if (currentAcademicYear < startYear) {
      yearSel.value = startYear; // ถ้าปีปัจจุบันน้อยกว่า 2568 ให้เลือก 2568
    } else {
      yearSel.value = endYear; // ถ้าปีปัจจุบันมากกว่า 2578 ให้เลือก 2578
    }
    
    // เมื่อเปลี่ยนปีการศึกษา ให้อัพเดทช่วงเดือนที่เลือกได้
    yearSel.addEventListener('change', updateMonthSelectRange);
  }

  // ===== ฟังก์ชันอัพเดทช่วงเดือนที่เลือกได้ =====
  function updateMonthSelectRange() {
    const academicYear = parseInt(document.getElementById('yearSelect').value);
    const monthSel = document.getElementById('monthSelect');
    
    if (!academicYear) return;
    
    // คำนวณช่วงเดือนของปีการศึกษา
    const yearCE = academicYear - 543; // แปลงเป็น ค.ศ.
    const startMonth = `${yearCE}-05`; // พฤษภาคม
    const endMonth = `${yearCE + 1}-03`; // มีนาคมปีถัดไป
    
    // ตั้งค่า min และ max ให้ input
    monthSel.setAttribute('min', startMonth);
    monthSel.setAttribute('max', endMonth);
    
    // ตรวจสอบว่าค่าปัจจุบันอยู่ในช่วงหรือไม่
    const currentValue = monthSel.value;
    if (currentValue && (currentValue < startMonth || currentValue > endMonth)) {
      // ถ้าไม่อยู่ในช่วง ให้ตั้งเป็นเดือนเริ่มต้นของปีการศึกษา
      monthSel.value = startMonth;
    }
    
    // เพิ่ม tooltip แสดงช่วงเดือนที่เลือกได้
    const startMonthName = getThaiMonthName(5) + ' ' + academicYear;
    const endMonthName = getThaiMonthName(3) + ' ' + (academicYear + 1);
    monthSel.setAttribute('title', `ช่วงปีการศึกษา: ${startMonthName} - ${endMonthName}`);
  }

  // ===== ฟังก์ชันตรวจสอบความถูกต้องของเดือนที่เลือก =====
  function validateMonthSelection() {
    const academicYear = parseInt(document.getElementById('yearSelect').value);
    const monthValue = document.getElementById('monthSelect').value;
    
    if (!academicYear || !monthValue) return false;
    
    const [yearCE, month] = monthValue.split('-').map(Number);
    const yearBE = yearCE + 543;
    
    // ตรวจสอบว่าเดือนที่เลือกอยู่ในปีการศึกษาหรือไม่
    const isValidMonth = (
      (yearBE === academicYear && month >= 5) || // พฤษภาคม-ธันวาคม ของปีการศึกษา
      (yearBE === academicYear + 1 && month <= 3) // มกราคม-มีนาคม ของปีถัดไป
    );
    
    return isValidMonth;
  }

  // ===== ฟังก์ชันตั้งค่าเดือนเริ่มต้น =====
  function setDefaultMonth() {
    const monthSel = document.getElementById('monthSelect');
    const today = new Date();
    const currentYear = today.getFullYear(); // ค.ศ.
    const currentMonth = today.getMonth() + 1; // เดือน 1-12
    
    // ตั้งค่าเป็นเดือนปัจจุบัน
    let yyyy = currentYear;
    let mm = currentMonth;
    
    if (mm < 10) mm = '0' + mm;
    monthSel.value = yyyy + '-' + mm;
    
    // อัพเดทช่วงเดือนที่เลือกได้ตามปีการศึกษาเริ่มต้น
    setTimeout(() => {
      updateMonthSelectRange();
    }, 100);
  }

  // เรียกใช้ทันทีหลังประกาศ
  fillYearSelect();
  setDefaultMonth();

  // ===== การจัดการแสดง/ซ่อนช่องตัวเลือก =====
  document.getElementById('reportMode').addEventListener('change', function() {
  const mode = this.value;
  const monthGroup = document.getElementById('monthGroup');
  const semesterGroup = document.getElementById('semesterGroup');
  const studentGroup = document.getElementById('studentGroup');
  
  if (mode === 'month') {
    monthGroup.style.display = 'block';
    semesterGroup.style.display = 'none';
    studentGroup.style.display = 'none';
  } else if (mode === 'semester') {
    monthGroup.style.display = 'none';
    semesterGroup.style.display = 'block';
    studentGroup.style.display = 'none';
  } else if (mode === 'student') {
    monthGroup.style.display = 'none';
    semesterGroup.style.display = 'none';
    studentGroup.style.display = 'block';

  } else if (mode === 'monthlyAttendance') {
    monthGroup.style.display = 'none';
    semesterGroup.style.display = 'none';

});

  // ===== ฟังก์ชันโหลดรายชื่อนักเรียน =====
  function loadStudentsList() {
    const grade = document.getElementById('gradeSelect').value;
    const classNo = document.getElementById('classSelect').value;
    const studentSelect = document.getElementById('studentSelect');
    
    if (!grade || !classNo) {
      studentSelect.innerHTML = '<option value="">กรุณาเลือกชั้น/ห้องก่อน</option>';
      return;
    }
    
    studentSelect.innerHTML = '<option value="">🔄 กำลังโหลด...</option>';
    
    google.script.run
      .withSuccessHandler(function(students) {
        studentSelect.innerHTML = '<option value="">เลือกนักเรียน</option>';
        students.forEach(student => {
          const option = document.createElement('option');
          option.value = student.id;
          option.textContent = `${student.id} - ${student.name}`;
          studentSelect.appendChild(option);
        });
      })
      .withFailureHandler(function(error) {
        studentSelect.innerHTML = '<option value="">❌ โหลดข้อมูลไม่สำเร็จ</option>';
        console.error('Error loading students:', error);
      })
      .getStudentsList(grade, classNo);

  document.getElementById('gradeSelect').addEventListener('change', function() {

  // ===== ฟังก์ชันแสดงผลรายเดือน (เดิม) =====

    if (data && Array.isArray(data)) {

    data.forEach((stu, idx) => {

    const percentGroups = { 'ดีมาก (≥80%)': 0, 'ดี (70-79%)': 0, 'พอใช้ (60-69%)': 0, 'ต้องปรับปรุง (<60%)': 0 };

// 🆕 ฟังก์ชันโหลดข้อมูลสถิติรายเดือน
function loadMonthlyStats(grade, classNo, academicYear) {
  console.log(`🔍 Loading monthly stats for ${grade}/${classNo}/${academicYear}`);
  
  google.script.run
    .withSuccessHandler(function(monthlyStats) {
      console.log('✅ Monthly stats loaded:', monthlyStats);
      renderMonthlyStats(monthlyStats);
    })
    .withFailureHandler(function(error) {
      console.error('❌ Error loading monthly stats:', error);
      document.getElementById('monthlyStatsContainer').innerHTML = `
        <div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle"></i> 
          ไม่สามารถโหลดข้อมูลรายเดือนได้: ${error.message}
        </div>
      `;
    })
    .getMonthlyAttendanceStats(grade, classNo, academicYear);
}

// 🆕 ฟังก์ชันแสดงผลสถิติรายเดือน
function renderMonthlyStats(monthlyStats) {
  if (!monthlyStats || monthlyStats.length === 0) {
    document.getElementById('monthlyStatsContainer').innerHTML = `
      <div class="alert alert-info">
        <i class="bi bi-info-circle"></i> ไม่พบข้อมูลรายเดือนสำหรับปีการศึกษานี้
      </div>
    `;
    return;
  }

  // แยกข้อมูลตามภาคเรียน
  const semester1 = monthlyStats.filter(m => m.semester === 1);
  const semester2 = monthlyStats.filter(m => m.semester === 2);

  let html = ``;

  // แสดงภาคเรียนที่ 1
  if (semester1.length > 0) {
    html += createSemesterSection('ภาคเรียนที่ 1', semester1, 'primary');
  }

  // แสดงภาคเรียนที่ 2
  if (semester2.length > 0) {
    html += createSemesterSection('ภาคเรียนที่ 2', semester2, 'success');
  }

  // กราฟแนวโน้มรายเดือน
  html += `
    <div class="mt-4">
      <h6 class="mb-3"><i class="bi bi-graph-up"></i> แนวโน้มการมาเรียนตลอดปี</h6>
      <div class="chart-container" style="height: 350px;">
        <canvas id="monthlyTrendChart"></canvas>
      </div>
    </div>
  `;

  document.getElementById('monthlyStatsContainer').innerHTML = html;

  // สร้างกราฟแนวโน้ม
  setTimeout(() => {
    createMonthlyTrendChart(monthlyStats);
  }, 100);
}

// 🆕 ฟังก์ชันสร้างส่วนแสดงแต่ละภาคเรียน
function createSemesterSection(semesterName, semesterData, colorClass) {
  let html = `
    <div class="mb-4">
      <h6 class="mb-3 text-${colorClass}"><i class="bi bi-calendar2-range"></i> ${semesterName}</h6>
      <div class="row">
  `;

  semesterData.forEach(month => {
    const hasData = month.studentsWithData > 0;
    const cardClass = hasData ? '' : 'text-muted';
    const badgeClass = hasData ? getBadgeClass(month.avgPresent) : 'bg-secondary';
    
    html += `
      <div class="col-lg-2 col-md-3 col-sm-4 col-6 mb-3">
        <div class="card h-100 ${cardClass}">
          <div class="card-body p-3 text-center">
            <h6 class="card-title mb-2" style="font-size: 0.9rem;">${month.monthName}</h6>
            <div class="mb-2">
              <span class="badge ${badgeClass} mb-1">${month.avgPresentStr}</span>
              <br>
              <small class="text-muted">${month.statusText}</small>
            </div>
            ${hasData ? `
              <div style="font-size: 0.8rem;">
                <div>มา: <strong>${month.totalPresent}</strong></div>
                <div>ลา: ${month.totalLeave}</div>
                <div>ขาด: ${month.totalAbsent}</div>
                <div class="text-muted">นักเรียน: ${month.studentsWithData} คน</div>
              </div>
            ` : `
              <div style="font-size: 0.8rem;" class="text-muted">
                ไม่มีข้อมูล
              </div>
            `}
          </div>
        </div>
      </div>
    `;
  });

  html += `
      </div>
    </div>
  `;

  return html;
}

// 🆕 ฟังก์ชันกำหนดสี badge ตามเปอร์เซ็นต์
function getBadgeClass(percentage) {
  if (percentage >= 80) return 'bg-success';
  if (percentage >= 70) return 'bg-info';
  if (percentage >= 60) return 'bg-warning';
  return 'bg-danger';
}

// 🆕 ฟังก์ชันสร้างกราฟแนวโน้มรายเดือน
function createMonthlyTrendChart(monthlyStats) {
  const ctx = document.getElementById('monthlyTrendChart');
  if (!ctx) return;

  // เตรียมข้อมูลสำหรับกราฟ
  const labels = monthlyStats.map(m => m.monthName);
  const presentData = monthlyStats.map(m => m.avgPresent);
  const leaveData = monthlyStats.map(m => m.avgLeave);
  const absentData = monthlyStats.map(m => m.avgAbsent);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'มาเรียน (%)',
          data: presentData,
          borderColor: '#28a745',
          backgroundColor: 'rgba(40, 167, 69, 0.1)',
          borderWidth: 3,
          fill: true,
          tension: 0.4
        },
        {
          label: 'ลา (%)',
          data: leaveData,
          borderColor: '#ffc107',
          backgroundColor: 'rgba(255, 193, 7, 0.1)',
          borderWidth: 2,
          fill: false,
          tension: 0.4
        },
        {
          label: 'ขาด (%)',
          data: absentData,
          borderColor: '#dc3545',
          backgroundColor: 'rgba(220, 53, 69, 0.1)',
          borderWidth: 2,
          fill: false,
          tension: 0.4
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        title: {
          display: true,
          text: 'แนวโน้มเปอร์เซ็นต์การเข้าเรียนแต่ละเดือน'
        },
        legend: {
          position: 'top'
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100,
          ticks: {
            callback: function(value) {
              return value + '%';
            }
          }
        },
        x: {
          title: {
            display: true,
            text: 'เดือน'
          }
        }
      },
      elements: {
        point: {
          radius: 5,
          hoverRadius: 8
        }
      }
    }
  });
}

// ===== ฟังก์ชันแสดงผลรายภาคเรียน =====
function renderTableSemester(data, grade, classNo, yearDisplay, semester) {
    // --- เพิ่มโค้ดเรียงลำดับข้อมูลนักเรียนตาม ID ---
    if (data && Array.isArray(data)) {
        data.sort((a, b) => String(a.studentId).localeCompare(String(b.studentId)));
    }
    // --- สิ้นสุดโค้ดที่เพิ่ม ---

    const semesterName = semester === '1' ? 'ภาคเรียนที่ 1 (พฤษภาคม - ตุลาคม)' : 'ภาคเรียนที่ 2 (พฤศจิกายน - มีนาคม)';
    
    let html = `<div class="result-table p-4">
    <h5 class="mb-4"><i class="bi bi-calendar-range"></i> รายงานสรุปรายภาคเรียน (ปีการศึกษา ${yearDisplay})</h5>`;
    
    if (!data || !data.length) { 
    html += `<div class="alert alert-warning"><i class="bi bi-exclamation-triangle"></i> ไม่พบข้อมูลสำหรับภาคเรียนนี้</div></div>`; 
    document.getElementById('reportTableContainer').innerHTML = html; 
    return; 
    }
    
    // คำนวณสถิติรวม
    let totalPresent = 0, totalLeave = 0, totalAbsent = 0, totalDays = 0;
    data.forEach(stu => {
    totalPresent += stu.present || 0;
    totalLeave += stu.leave || 0;
    totalAbsent += stu.absent || 0;
    totalDays += stu.total || 0;
    });
    
    const avgAttendance = totalDays > 0 ? ((totalPresent / totalDays) * 100).toFixed(1) : "0.0";
    
    // แสดงสถิติรวมแบบ modern cards
    html += `
    <div class="alert alert-info text-center mb-4">
      <h6 class="mb-0">${semesterName}</h6>
    </div>
    
    <div class="row mb-4">
      <div class="col-md-3 col-6">
        <div class="card stat-card stat-present">
          <div class="card-body text-center py-3">
            <i class="bi bi-check-circle fs-2 mb-2"></i>
            <h4 class="mb-1">${totalPresent.toLocaleString()}</h4>
            <p class="mb-0">วันมาเรียน</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="card stat-card stat-leave">
          <div class="card-body text-center py-3">
            <i class="bi bi-exclamation-circle fs-2 mb-2"></i>
            <h4 class="mb-1">${totalLeave.toLocaleString()}</h4>
            <p class="mb-0">วันลา</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="card stat-card stat-absent">
          <div class="card-body text-center py-3">
            <i class="bi bi-x-circle fs-2 mb-2"></i>
            <h4 class="mb-1">${totalAbsent.toLocaleString()}</h4>
            <p class="mb-0">วันขาด</p>
          </div>
        </div>
      </div>
      <div class="col-md-3 col-6">
        <div class="card stat-card stat-percentage">
          <div class="card-body text-center py-3">
            <i class="bi bi-percent fs-2 mb-2"></i>
            <h4 class="mb-1">${avgAttendance}%</h4>
            <p class="mb-0">เฉลี่ยการมาเรียน</p>
          </div>
        </div>
      </div>
    </div>`;
    
    // ตารางข้อมูลแบบ modern
    const percentGroups = { 'ดีมาก (≥80%)': 0, 'ดี (70-79%)': 0, 'พอใช้ (60-69%)': 0, 'ต้องปรับปรุง (<60%)': 0 };
    
    html += `
    <div class="modern-table">
      <table class="table table-bordered mb-0">
        <thead><tr>
          <th>ลำดับ</th><th>รหัส</th><th class="text-start">ชื่อ-สกุล</th>
          <th>มา</th><th>ลา</th><th>ขาด</th><th>รวม</th><th>%มาเรียน</th><th>สถานะ</th>
        </tr></thead>
        <tbody>`;
    
    data.forEach((stu, idx) => {
    const total = stu.total || (stu.present + stu.leave + stu.absent);
    const percent = total > 0 ? ((stu.present/total)*100).toFixed(1) : "0.0";
    const percentNum = parseFloat(percent);
    
    // จัดกลุ่มข้อมูล
    if (percentNum >= 80) percentGroups['ดีมาก (≥80%)']++;
    else if (percentNum >= 70) percentGroups['ดี (70-79%)']++;
    else if (percentNum >= 60) percentGroups['พอใช้ (60-69%)']++;
    else percentGroups['ต้องปรับปรุง (<60%)']++;
    
    // กำหนดสถานะ
    let status = "", badgeClass = "";
    if (percentNum >= 80) { status = "ดีมาก"; badgeClass = "bg-success"; }
    else if (percentNum >= 70) { status = "ดี"; badgeClass = "bg-info"; }
    else if (percentNum >= 60) { status = "พอใช้"; badgeClass = "bg-warning"; }
    else { status = "ต้องปรับปรุง"; badgeClass = "bg-danger"; }
    
    html += `<tr>
      <td>${idx+1}</td>
      <td><strong>${stu.studentId}</strong></td>
      <td class="text-start">${stu.name||'-'}</td>
      <td><span class="badge modern-badge bg-success">${stu.present}</span></td>
      <td><span class="badge modern-badge bg-warning text-dark">${stu.leave}</span></td>
      <td><span class="badge modern-badge bg-danger">${stu.absent}</span></td>
      <td><strong>${total}</strong></td>
      <td>
        <div class="d-flex align-items-center">
          <div class="progress-modern flex-grow-1 me-2">
            <div class="progress-bar-modern bg-primary" style="width: ${percent}%"></div>
          </div>
          <span><strong>${percent}%</strong></span>
        </div>
      </td>
      <td><span class="badge modern-badge ${badgeClass}">${status}</span></td>
    </tr>`;
    });
    
    html += `</tbody></table></div></div>`;
    document.getElementById('reportTableContainer').innerHTML = html;
    
    // เพิ่มปุ่มส่งออก
document.getElementById('exportBtnArea').innerHTML = `
  <button id="exportPdfBtn" class="btn btn-success me-2">
      <i class="bi bi-file-earmark-pdf"></i> ส่งออก PDF

  <button id="saveSemesterSheetBtn" class="btn btn-warning">
      <i class="bi bi-save"></i> บันทึกลงชีต
  </button>
`;

    }));
    
    document.getElementById('centerLoadingIndicator').style.display = 'block';
    google.script.run

        document.getElementById('centerLoadingIndicator').style.display = 'block';
        var toastEl = document.getElementById('saveToast');
        var toast = new bootstrap.Toast(toastEl);
        toast.show();
      })
      .withFailureHandler(function(e){
        document.getElementById('centerLoadingIndicator').style.display = 'block';

}
