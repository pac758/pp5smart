<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เพิ่มผู้ใช้</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
    }
    
    .main-container {
      max-width: 500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      visibility: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease-out;
    }
    
    .main-container.loaded {
      visibility: visible;
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Role card default styles */
    .role-card {
      background: white;
      border: 2px solid #d1d5db;
      border-radius: 0.75rem;
      padding: 0.75rem;
      text-align: center;
    }
    
    /* Input field styles */
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.625rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    /* Button styles */
    button[type="submit"] {
      width: 100%;
      background: linear-gradient(to right, #9333ea, #2563eb);
      color: white;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    /* Hide select dropdown */
    select {
      display: none;
    }
    
    /* Grid layouts */
    .grid-cols-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }
    
    /* Text styles */
    .text-center { text-align: center; }
    .text-sm { font-size: 0.875rem; }
    .text-xs { font-size: 0.75rem; }
    .text-2xl { font-size: 1.5rem; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .text-gray-700 { color: #374151; }
    .text-gray-600 { color: #4b5563; }
    .text-gray-800 { color: #1f2937; }
    .text-gray-500 { color: #6b7280; }
    
    /* Margins */
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 0.75rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .mt-4 { margin-top: 1rem; }
    .mr-2 { margin-right: 0.5rem; }
    
    /* Flexbox */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .space-x-2 > * + * { margin-left: 0.5rem; }
    
    /* Block */
    .block { display: block; }
    .hidden { display: none; }
    
    /* Inline flex */
    .inline-flex { display: inline-flex; }
    
    /* Sizing */
    .w-14 { width: 3.5rem; }
    .h-14 { height: 3.5rem; }
    
    /* Backgrounds */
    .bg-gradient-to-br {
      background: linear-gradient(to bottom right, #a855f7, #2563eb);
    }
    
    /* Border radius */
    .rounded-full { border-radius: 9999px; }
    .rounded-lg { border-radius: 0.5rem; }
    .rounded-xl { border-radius: 0.75rem; }
    
    /* Shadows */
    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Remove fadeIn animation - using transition instead */
    
    .input-focus:focus {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
    }
    
    .btn-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
    }
    
    .role-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .role-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }
    
    .role-card.selected {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }
    
    .role-card.selected .text-gray-500 {
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- Header -->
    <div class="text-center mb-6">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-purple-500 to-blue-600 rounded-full shadow-lg mb-3">
        <span class="text-2xl">👤</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-800 mb-1">เพิ่มผู้ใช้ใหม่</h1>
      <p class="text-gray-600 text-sm">กรอกข้อมูลเพื่อสร้างบัญชีผู้ใช้</p>
    </div>

    <form onsubmit="addUser(); return false;">
      <!-- Username Field -->
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-semibold mb-2">
          <span class="flex items-center">
            <span class="mr-2">👤</span>
            ชื่อผู้ใช้
          </span>
        </label>
        <input 
          type="text" 
          id="username" 
          class="input-focus w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-all duration-300"
          placeholder="กรอกชื่อผู้ใช้"
          required
        >
      </div>

      <!-- Password Field -->
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-semibold mb-2">
          <span class="flex items-center">
            <span class="mr-2">🔒</span>
            รหัสผ่าน
          </span>
        </label>
        <input 
          type="password" 
          id="password" 
          class="input-focus w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-all duration-300"
          placeholder="กรอกรหัสผ่าน"
          required
        >
      </div>

      <!-- Name Fields -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label class="block text-gray-700 text-sm font-semibold mb-2">
            <span class="flex items-center">
              <span class="mr-2">📝</span>
              ชื่อจริง
            </span>
          </label>
          <input 
            type="text" 
            id="firstName" 
            class="input-focus w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-all duration-300"
            placeholder="ชื่อ"
            required
          >
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-semibold mb-2">
            <span class="flex items-center">
              <span class="mr-2">📝</span>
              นามสกุล
            </span>
          </label>
          <input 
            type="text" 
            id="lastName" 
            class="input-focus w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-all duration-300"
            placeholder="นามสกุล"
            required
          >
        </div>
      </div>

      <!-- Role Selection -->
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-semibold mb-3">
          <span class="flex items-center">
            <span class="mr-2">⚡</span>
            สิทธิ์ผู้ใช้
          </span>
        </label>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;">
          <div class="role-card bg-white border-2 border-gray-300 rounded-xl p-3 text-center" onclick="selectRole('admin', this)">
            <div class="text-2xl mb-1">👑</div>
            <div class="font-semibold">Admin</div>
            <div class="text-xs text-gray-500 mt-1">ผู้ดูแลระบบ</div>
          </div>
          <div class="role-card bg-white border-2 border-gray-300 rounded-xl p-3 text-center" onclick="selectRole('teacher', this)">
            <div class="text-2xl mb-1">👨‍🏫</div>
            <div class="font-semibold">Teacher</div>
            <div class="text-xs text-gray-500 mt-1">ครูผู้สอน</div>
          </div>
          <div class="role-card bg-white border-2 border-gray-300 rounded-xl p-3 text-center" onclick="selectRole('parent', this)">
            <div class="text-2xl mb-1">👨‍👩‍👧</div>
            <div class="font-semibold">Parent</div>
            <div class="text-xs text-gray-500 mt-1">ผู้ปกครอง</div>
          </div>
        </div>
        <select id="role" class="hidden">
          <option value="admin">admin</option>
          <option value="teacher">teacher</option>
          <option value="parent">parent</option>
        </select>
      </div>

      <!-- Student IDs (สำหรับ Parent เท่านั้น) -->
      <div class="mb-6" id="studentIdsGroup" style="display:none;">
        <label class="block text-gray-700 text-sm font-semibold mb-2">
          <span class="flex items-center">
            <span class="mr-2">🎓</span>
            รหัสนักเรียน
          </span>
        </label>
        <input 
          type="text" 
          id="studentIds" 
          class="input-focus w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 transition-all duration-300"
          placeholder="เช่น S001, S002 (คั่นด้วยเครื่องหมาย ,)"
        >
        <p style="font-size:0.75rem;color:#6b7280;margin-top:0.25rem;">ระบุรหัสนักเรียนที่ผู้ปกครองดูแล คั่นด้วยเครื่องหมายจุลภาค</p>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit"
        class="btn-hover w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300 flex items-center justify-center space-x-2"
      >
        <span>💾</span>
        <span>บันทึกผู้ใช้</span>
      </button>

      <!-- Status Message -->
      <div id="status" class="mt-4 p-3 rounded-lg text-center font-medium hidden"></div>
    </form>
  </div>

  <script>
    // Wrap everything in IIFE to avoid variable conflicts
    (function() {
      'use strict';
      
      let selectedRole = 'admin'; // Default role
      let isInitialized = false;

      function selectRole(role, element) {
        if (!element) return;
        
        try {
          // Remove selected class from all role cards
          document.querySelectorAll('.role-card').forEach(card => {
            if (card) card.classList.remove('selected');
          });
          
          // Add selected class to clicked card
          element.classList.add('selected');
          
          // Update hidden select and selectedRole
          selectedRole = role;
          const roleSelect = document.getElementById('role');
          if (roleSelect) roleSelect.value = role;
          
          // แสดง/ซ่อนช่อง studentIds ตาม role
          const sidGroup = document.getElementById('studentIdsGroup');
          if (sidGroup) {
            sidGroup.style.display = (role === 'parent') ? 'block' : 'none';
          }
        } catch (error) {
          console.error('Error in selectRole:', error);
        }
      }

      function showStatus(message, isSuccess = true) {
        try {
          const statusDiv = document.getElementById('status');
          if (!statusDiv) return;
          
          statusDiv.className = `mt-4 p-3 rounded-lg text-center font-medium ${isSuccess ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;
          statusDiv.textContent = message;
          statusDiv.classList.remove('hidden');
          
          // Hide after 5 seconds
          setTimeout(() => {
            if (statusDiv) statusDiv.classList.add('hidden');
          }, 5000);
        } catch (error) {
          console.error('Error in showStatus:', error);
        }
      }

      function addUser() {
        try {
          const usernameEl = document.getElementById("username");
          const passwordEl = document.getElementById("password");
          const firstNameEl = document.getElementById("firstName");
          const lastNameEl = document.getElementById("lastName");
          
          if (!usernameEl || !passwordEl || !firstNameEl || !lastNameEl) {
            showStatus("ไม่พบฟอร์ม กรุณาลองรีเฟรชหน้าใหม่", false);
            return;
          }

          const username = usernameEl.value.trim();
          const password = passwordEl.value.trim();
          const firstName = firstNameEl.value.trim();
          const lastName = lastNameEl.value.trim();
          const role = selectedRole;

          if (!username || !password || !firstName || !lastName) {
            showStatus("กรุณากรอกข้อมูลให้ครบทุกช่อง", false);
            return;
          }

          // Show loading state
          const submitBtn = document.querySelector('button[type="submit"]');
          if (!submitBtn) return;
          
          const originalContent = submitBtn.innerHTML;
          submitBtn.innerHTML = '<span class="animate-spin">⏳</span><span>กำลังบันทึก...</span>';
          submitBtn.disabled = true;

          if (typeof google === 'undefined' || !google.script || !google.script.run) {
            showStatus("ไม่สามารถเชื่อมต่อกับระบบได้", false);
            submitBtn.innerHTML = originalContent;
            submitBtn.disabled = false;
            return;
          }

          google.script.run.withSuccessHandler(function(response) {
            try {
              // console.log("Response from server:", response);
              
              // Handle response - check if it's an object or string
              let message = "";
              let isSuccess = true;
              
              if (typeof response === 'string') {
                message = response;
              } else if (typeof response === 'object' && response !== null) {
                // Check success status
                isSuccess = response.success !== false;
                
                // Extract message from object
                message = response.message || response.msg || response.status || "";
                
                // If no message found, create default message
                if (!message) {
                  message = isSuccess ? "บันทึกข้อมูลเรียบร้อยแล้ว" : "เกิดข้อผิดพลาด";
                }
              } else {
                message = "บันทึกข้อมูลเรียบร้อยแล้ว";
              }
              
              showStatus(message, isSuccess);
              
              if (isSuccess) {
                // Clear form
                if (usernameEl) usernameEl.value = "";
                if (passwordEl) passwordEl.value = "";
                if (firstNameEl) firstNameEl.value = "";
                if (lastNameEl) lastNameEl.value = "";
                var sidEl = document.getElementById('studentIds');
                if (sidEl) sidEl.value = '';
                var sidGroup = document.getElementById('studentIdsGroup');
                if (sidGroup) sidGroup.style.display = 'none';
                
                // Reset role selection
                document.querySelectorAll('.role-card').forEach(card => {
                  if (card) card.classList.remove('selected');
                });
                const firstCard = document.querySelector('.role-card');
                if (firstCard) firstCard.classList.add('selected');
                selectedRole = 'admin';
              }
              
              // Reset button
              if (submitBtn) {
                submitBtn.innerHTML = originalContent;
                submitBtn.disabled = false;
              }
            } catch (error) {
              console.error('Error in success handler:', error);
              if (submitBtn) {
                submitBtn.innerHTML = originalContent;
                submitBtn.disabled = false;
              }
            }
          }).withFailureHandler(function(error) {
            try {
              showStatus("เกิดข้อผิดพลาด: " + (error.message || 'ไม่ทราบสาเหตุ'), false);
              
              // Reset button
              if (submitBtn) {
                submitBtn.innerHTML = originalContent;
                submitBtn.disabled = false;
              }
            } catch (e) {
              console.error('Error in failure handler:', e);
            }
          }).addNewUser({ username, password, firstName, lastName, role, studentIds: (document.getElementById('studentIds')?.value || '').trim() });
        } catch (error) {
          console.error('Error in addUser:', error);
          showStatus("เกิดข้อผิดพลาด: " + error.message, false);
        }
      }

      // Initialize default role selection and show form
      function initialize() {
        if (isInitialized) return;
        
        try {
          // Select first role card as default
          const firstCard = document.querySelector('.role-card');
          if (firstCard) {
            firstCard.classList.add('selected');
          }
          
          // Show form after DOM is ready
          const container = document.querySelector('.main-container');
          if (container) {
            // Small delay to ensure everything is loaded
            setTimeout(() => {
              container.classList.add('loaded');
            }, 100);
          }
          
          isInitialized = true;
        } catch (error) {
          console.error('Error in initialize:', error);
        }
      }

      // Multiple initialization strategies
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
      } else {
        initialize();
      }
      
      // Backup initialization after a short delay
      setTimeout(initialize, 200);
      
      // Expose functions to global scope for onclick handlers
      window.selectRole = selectRole;
      window.addUser = addUser;
    })();
  </script>
</body>
</html>
