<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบรายงานผลการเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif; line-height: 1.6; color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px;
    }
    .container {
      max-width: 1000px; margin: 0 auto; background: white; border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15); overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: white; padding: 30px; text-align: center;
    }
    .header h1 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 1.1rem; }

    /* Tab System */
    .tab-container { background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .tabs { display: flex; justify-content: center; padding: 0; margin: 0; list-style: none; }
    .tab { flex: 1; max-width: 300px; }
    .tab-btn {
      width: 100%; padding: 20px; background: transparent; border: none;
      font-family: inherit; font-size: 1.1rem; font-weight: 500; color: #64748b;
      cursor: pointer; transition: all 0.3s ease; position: relative; border-bottom: 3px solid transparent;
    }
    .tab-btn:hover { background: rgba(79, 70, 229, 0.05); color: #4f46e5; }
    .tab-btn.active {
      color: #4f46e5; background: rgba(79, 70, 229, 0.05); border-bottom-color: #4f46e5; font-weight: 600;
    }
    .tab-btn .icon { font-size: 1.3rem; margin-right: 8px; }

    /* Content */
    .content-area { padding: 30px; min-height: 500px; }
    .tab-content { display: none; animation: fadeIn 0.3s ease-in; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }

    /* Form Styles */
    .form-section { margin-bottom: 25px; }
    .section-title { font-size: 1.3rem; font-weight: 600; color: #374151; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb; }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media (min-width: 768px) {
      .form-grid { grid-template-columns: 1fr 1fr 1fr; }
      .form-group.full-width { grid-column: 1 / -1; }
    }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; color: #374151; font-size: 1rem; }
    select, input {
      width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 12px;
      font-size: 16px; font-family: inherit; transition: all 0.3s ease; background: white;
    }
    select:focus, input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

    /* Generate Button */
    .generate-btn {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white;
      padding: 16px 24px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600;
      width: 100%; transition: all 0.3s ease;
    }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3); }
    .generate-btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ========================================
     * Loading Box with PDF Animation
     * ======================================== */
    .loading { 
      display: none; 
      text-align: center; 
      margin-top: 30px; 
      padding: 30px 20px; 
    }
    .loading.active { 
      display: block; 
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      border: 2px solid #3b82f6;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.2);
    }

    /* PDF Document Animation (แบบที่ 5) */
    .loading-pdf {
      width: 80px;
      height: 100px;
      position: relative;
      margin: 0 auto 20px auto;
    }

    .loading-pdf .document {
      width: 100%;
      height: 100%;
      background: white;
      border: 3px solid #667eea;
      border-radius: 8px;
      position: relative;
      animation: float 2s ease-in-out infinite;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .loading-pdf .document::before {
      content: 'PDF';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 700;
      font-size: 1.2rem;
      color: #667eea;
    }

    .loading-pdf .lines {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
    }

    .loading-pdf .lines .line {
      height: 3px;
      background: #e5e7eb;
      margin: 5px 0;
      border-radius: 2px;
      animation: fill 1.5s ease-in-out infinite;
    }

    .loading-pdf .lines .line:nth-child(1) { animation-delay: 0s; }
    .loading-pdf .lines .line:nth-child(2) { animation-delay: 0.3s; }
    .loading-pdf .lines .line:nth-child(3) { animation-delay: 0.6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fill {
      0%, 100% { 
        background: #e5e7eb;
        width: 100%;
      }
      50% { 
        background: #667eea;
        width: 60%;
      }
    }

    .loading-text { 
      font-size: 1.1rem; 
      font-weight: 600; 
      color: #1e40af; 
      margin-bottom: 8px; 
    }
    .loading-subtext { 
      font-size: 0.95rem; 
      color: #3b82f6; 
      margin-top: 8px; 
    }

    /* Result */
    .result { margin-top: 24px; padding: 20px; border-radius: 12px; border-left: 4px solid; }
    .success { background-color: #ecfdf5; border-left-color: #10b981; color: #047857; }
    .error { background-color: #fef2f2; border-left-color: #ef4444; color: #dc2626; }
    .result h3 { margin-bottom: 8px; font-weight: 600; }
    .result a { color: inherit; text-decoration: none; font-weight: 500; border-bottom: 2px solid currentColor; }

    /* Student List */
    .student-grid {
      display: grid; grid-template-columns: 1fr; gap: 12px; max-height: 300px; overflow-y: auto; padding: 5px;
      border: 2px solid #e5e7eb; border-radius: 12px; background: #f9fafb;
    }
    @media (min-width: 768px) { .student-grid { grid-template-columns: repeat(2, 1fr); } }
    .student-option {
      padding: 14px 16px; background: white; border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer;
      transition: all 0.3s ease; display: flex; align-items: center;
    }
    .student-option:hover { border-color: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1); }
    .student-checkbox { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }
    .student-info { flex: 1; }
    .student-name { font-size: 1rem; font-weight: 500; }
    .student-id { font-size: 0.85rem; color: #6b7280; }

    /* Bulk Controls */
    .bulk-controls {
      display: flex; justify-content: space-between; align-items: center; 
      margin-bottom: 12px; padding: 12px; background: #f9fafb; border-radius: 10px; border: 2px solid #e5e7eb;
    }
    .select-all-container { display: flex; align-items: center; gap: 8px; }
    .select-all-checkbox { width: 18px; height: 18px; cursor: pointer; }
    .selection-count { font-size: 0.95rem; color: #6b7280; font-weight: 500; }

    /* Info Box */
    .info-box {
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border: 2px solid #3b82f6; border-radius: 12px; padding: 16px; margin-bottom: 20px;
    }
    .info-box .icon { color: #3b82f6; font-size: 1.2rem; margin-right: 8px; }
    .info-box p { margin: 0; color: #1e40af; font-weight: 500; }

    .badge { display: inline-block; padding: 4px 12px; background: #10b981; color: white; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-left: 8px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 ระบบรายงานผลการเรียน</h1>
      <p>สร้างรายงาน PDF แบบเร่งด่วน - เร็วกว่าเดิม 3-4 เท่า! 🚀</p>
    </div>

    <div class="content-area">
      <div id="student-report" class="tab-content active">
        <form id="studentReportForm">
          <div class="form-section">
            <h2 class="section-title">👤 รายงานรายบุคคล (ปพ.6)</h2>
            <div class="info-box">
              <p><span class="icon">⚡</span> เวอร์ชันใหม่: เร็วขึ้น 3-4 เท่า | Smart Caching | Parallel Processing</p>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="studentGrade">🎓 ระดับชั้น:</label>
              <select id="studentGrade" required>
                <option value="">-- เลือกระดับชั้น --</option>
                <option value="ป.1">ประถมศึกษาปีที่ 1</option>
                <option value="ป.2">ประถมศึกษาปีที่ 2</option>
                <option value="ป.3">ประถมศึกษาปีที่ 3</option>
                <option value="ป.4">ประถมศึกษาปีที่ 4</option>
                <option value="ป.5">ประถมศึกษาปีที่ 5</option>
                <option value="ป.6">ประถมศึกษาปีที่ 6</option>
              </select>
            </div>
            <div class="form-group">
              <label for="studentClassNo">🏫 ห้อง:</label>
              <select id="studentClassNo" required>
                <option value="">-- เลือกห้อง --</option>
                <option value="1">ห้อง 1</option>
                <option value="2">ห้อง 2</option>
              </select>
            </div>
            <div class="form-group">
              <label for="studentTerm">📅 ภาคเรียน:</label>
              <select id="studentTerm" required>
                <option value="both">ทั้งสองภาคเรียน</option>
                <option value="1">ภาคเรียนที่ 1</option>
                <option value="2">ภาคเรียนที่ 2</option>
              </select>
            </div>
          </div>

          <div class="form-group full-width">
            <label>👨‍🎓 เลือกนักเรียน:</label>
            
            <div class="bulk-controls" id="bulkControls" style="display: none;">
              <div class="select-all-container">
                <input type="checkbox" id="selectAllCheckbox" class="select-all-checkbox">
                <label for="selectAllCheckbox" style="cursor: pointer; margin: 0;">เลือกทั้งหมด</label>
              </div>
              <div class="selection-count" id="selectionCount">เลือก 0 คน</div>
            </div>
            
            <div id="studentList" class="student-grid">
              <div style="text-align: center; padding: 20px; color: #6b7280; grid-column: 1 / -1;">
                📚 กรุณาเลือกระดับชั้นและห้องก่อน
              </div>
            </div>
          </div>

          <button type="submit" class="generate-btn" id="singleReportBtn" disabled>
            👤 สร้างรายงานรายบุคคล
          </button>
          <button type="button" class="generate-btn" id="bulkReportBtn" 
                  style="display: none; margin-top: 12px;" disabled>
            📦 สร้างรายงานที่เลือก (0 คน)
          </button>
        </form>

        <!-- ⭐ Loading with PDF Animation -->
        <div class="loading" id="loading">
          <div class="loading-pdf">
            <div class="document">
              <div class="lines">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
              </div>
            </div>
          </div>
          <div class="loading-text" id="loadingText">📝 กำลังสร้างรายงาน PDF</div>
          <div class="loading-subtext" id="loadingSubtext">กรุณารอสักครู่...</div>
        </div>

        <!-- ⭐ Result -->
        <div id="result"></div>
      </div>
    </div>
  </div>

  <script>
(function() {
  'use strict';
  
  let selectedStudents = new Set();
  let currentStudents = [];
  let busy = false;
  
  const SmartCache = {
    data: {},
    timestamps: {},
    TTL: { students: 5 * 60 * 1000 },
    
    set(key, value, category = 'default') {
      this.data[key] = value;
      this.timestamps[key] = { time: Date.now(), category };
      // console.log(`💾 [Cache] Stored: ${key}`);
    },
    
    get(key) {
      if (!this.data[key] || !this.timestamps[key]) return null;
      const { time, category } = this.timestamps[key];
      const age = Date.now() - time;
      const maxAge = this.TTL[category] || 300000;
      if (age > maxAge) {
        // console.log(`⏰ [Cache] Expired: ${key}`);
        delete this.data[key];
        delete this.timestamps[key];
        return null;
      }
      // console.log(`✅ [Cache] Hit: ${key}`);
      return this.data[key];
    }
  };
  
  function runServer(fnName, args = [], timeoutMs = 60000) {
    return new Promise((resolve, reject) => {
      let done = false;
      const timer = setTimeout(() => {
        if (done) return;
        done = true;
        reject(new Error(`Timeout after ${timeoutMs}ms`));
      }, timeoutMs);
      
      google.script.run
        .withSuccessHandler(res => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          resolve(res);
        })
        .withFailureHandler(err => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          reject(err);
        })[fnName].apply(null, args);
    });
  }
  
  window.switchTab = function(tabId, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
  };
  
  function showLoading(message, subtext) {
    busy = true;
    const loadingDiv = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const loadingSubtext = document.getElementById('loadingSubtext');
    loadingDiv.classList.add('active');
    loadingText.textContent = message || '📝 กำลังสร้างรายงาน PDF';
    loadingSubtext.textContent = subtext || 'กรุณารอสักครู่...';
    const resultDiv = document.getElementById('result');
    if (resultDiv) resultDiv.innerHTML = '';
  }
  
  function hideLoading() {
    busy = false;
    const loadingDiv = document.getElementById('loading');
    if (loadingDiv) loadingDiv.classList.remove('active');
  }
  
  function showSuccess(message) {
    hideLoading();
    const resultDiv = document.getElementById('result');
    if (resultDiv) {
      resultDiv.innerHTML = `
        <div class="result success">
          <h3>✅ สำเร็จ!</h3>
          <p style="white-space: pre-line;">${message}</p>
        </div>
      `;
    }
  }
  
  function showError(message) {
    hideLoading();
    const resultDiv = document.getElementById('result');
    if (resultDiv) {
      resultDiv.innerHTML = `
        <div class="result error">
          <h3>❌ เกิดข้อผิดพลาด</h3>
          <p>${message}</p>
        </div>
      `;
    }
  }
  
  async function loadStudentList() {
    const grade = document.getElementById('studentGrade').value;
    const classNo = document.getElementById('studentClassNo').value;
    const listDiv = document.getElementById('studentList');
    
    if (!grade || !classNo) {
      listDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#6b7280; grid-column:1 / -1;">📚 กรุณาเลือกระดับชั้นและห้องก่อน</div>';
      document.getElementById('bulkControls').style.display = 'none';
      updateSelectionUI();
      return;
    }
    
    const cacheKey = `students_${grade}_${classNo}`;
    const cached = SmartCache.get(cacheKey);
    
    if (cached) {
      updateStudentList(cached);
      return;
    }
    
    listDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#6b7280; grid-column:1 / -1;">⏳ กำลังโหลด...</div>';
    
    try {
      const students = await runServer('getStudentListForPp6', [grade, classNo], 45000);
      if (!students || !Array.isArray(students)) throw new Error('Invalid data');
      students.sort((a, b) => String(a.id || '').localeCompare(String(b.id || '')));
      SmartCache.set(cacheKey, students, 'students');
      updateStudentList(students);
    } catch (err) {
      console.error('[Error]:', err);
      showError('ไม่สามารถโหลดรายชื่อนักเรียนได้: ' + err.message);
    }
  }
  
  function updateStudentList(students) {
    const listDiv = document.getElementById('studentList');
    const bulkControls = document.getElementById('bulkControls');
    currentStudents = students || [];
    
    if (students && students.length > 0) {
      bulkControls.style.display = 'flex';
      const fragment = document.createDocumentFragment();
      
      students.forEach(student => {
        const div = document.createElement('div');
        div.className = 'student-option';
        div.innerHTML = `
          <input type="checkbox" class="student-checkbox" data-student-id="${student.id}">
          <div class="student-info">
            <div class="student-name">${student.name || 'Unnamed'}</div>
            <div class="student-id">${student.id || 'No ID'}</div>
          </div>
        `;
        
        const checkbox = div.querySelector('input');
        if (selectedStudents.has(student.id)) checkbox.checked = true;
        
        checkbox.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleStudentSelection(student.id, checkbox);
        });
        
        div.addEventListener('click', () => {
          checkbox.checked = !checkbox.checked;
          toggleStudentSelection(student.id, checkbox);
        });
        
        fragment.appendChild(div);
      });
      
      listDiv.innerHTML = '';
      listDiv.appendChild(fragment);
    } else {
      bulkControls.style.display = 'none';
      listDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#ef4444; grid-column:1 / -1;">❌ ไม่พบนักเรียน</div>';
    }
    
    updateSelectionUI();
  }
  
  function toggleStudentSelection(studentId, checkbox) {
    if (checkbox.checked) {
      selectedStudents.add(studentId);
    } else {
      selectedStudents.delete(studentId);
    }
    updateSelectionUI();
  }
  
  function updateSelectionUI() {
    const count = selectedStudents.size;
    const countDiv = document.getElementById('selectionCount');
    const singleBtn = document.getElementById('singleReportBtn');
    const bulkBtn = document.getElementById('bulkReportBtn');
    
    if (countDiv) countDiv.textContent = `เลือก ${count} คน`;
    
    if (count === 0) {
      singleBtn.disabled = true;
      singleBtn.textContent = '👤 กรุณาเลือกนักเรียนก่อน';
      singleBtn.style.display = 'block';
      bulkBtn.style.display = 'none';
    } else if (count === 1) {
      singleBtn.disabled = false;
      singleBtn.textContent = '👤 สร้างรายงานรายบุคคล';
      singleBtn.style.display = 'block';
      bulkBtn.style.display = 'none';
    } else {
      singleBtn.style.display = 'none';
      bulkBtn.style.display = 'block';
      bulkBtn.disabled = false;
      bulkBtn.textContent = `📦 สร้างรายงานที่เลือก (${count} คน)`;
    }
  }
  
  async function generateSingleReport() {
    if (busy || selectedStudents.size !== 1) return;
    
    const studentId = Array.from(selectedStudents)[0];
    const student = currentStudents.find(s => s.id === studentId);
    const term = document.getElementById('studentTerm').value;
    
    try {
      showLoading(`📝 กำลังสร้างรายงานสำหรับ ${student?.name || studentId}`, 'กรุณารอสักครู่...');
      const res = await runServer('generatePp6PDFComplete', [studentId, term], 120000);
      const pdfUrl = typeof res === 'string' ? res : (res.previewUrl || res.downloadUrl);
      showSuccess(`สร้างรายงานสำเร็จ!\n\n<a href="${pdfUrl}" target="_blank">📄 คลิกเพื่อดาวน์โหลด PDF</a>`);
    } catch (err) {
      console.error('[Error]:', err);
      showError('เกิดข้อผิดพลาด: ' + err.message);
    }
  }
  
  async function generateBulkReports() {
    if (busy || selectedStudents.size < 2) return;
    
    const studentIds = Array.from(selectedStudents);
    const total = studentIds.length;
    const term = document.getElementById('studentTerm').value;
    
    showLoading(`🚀 กำลังสร้างรายงาน ${total} คน (แบบเร่งด่วน)`, `ประมาณ ${Math.ceil(total * 10)} วินาที`);
    
    let successCount = 0;
    const successList = [];
    const errorList = [];
    
    try {
      const BATCH_SIZE = 3;
      const batches = [];
      for (let i = 0; i < studentIds.length; i += BATCH_SIZE) {
        batches.push(studentIds.slice(i, i + BATCH_SIZE));
      }
      
      for (let batchIndex = 0; batchIndex < batches.length; batchIndex++) {
        const batch = batches[batchIndex];
        
        const promises = batch.map(async (studentId) => {
          const student = currentStudents.find(s => s.id === studentId);
          const studentName = student ? student.name : `รหัส ${studentId}`;
          
          try {
            const res = await runServer('generatePp6PDFComplete', [studentId, term], 120000);
            const pdfUrl = typeof res === 'string' ? res : (res.previewUrl || res.downloadUrl);
            return { success: true, studentName, pdfUrl };
          } catch (err) {
            return { success: false, studentName, error: err.message };
          }
        });
        
        const results = await Promise.all(promises);
        
        results.forEach(result => {
          if (result.success) {
            successList.push(`<a href="${result.pdfUrl}" target="_blank">${result.studentName}</a>`);
            successCount++;
          } else {
            errorList.push(`${result.studentName}: ${result.error}`);
          }
        });
        
        if (batchIndex < batches.length - 1) {
          await new Promise(r => setTimeout(r, 1000));
        }
      }
      
      let summaryMessage = `📊 สร้างรายงานเสร็จสิ้น\n\n`;
      summaryMessage += `✅ สำเร็จ: ${successCount} คน\n`;
      summaryMessage += `❌ ล้มเหลว: ${errorList.length} คน\n\n`;
      
      if (successList.length) {
        summaryMessage += `📄 รายการ PDF:\n` + successList.join('\n');
      }
      if (errorList.length) {
        summaryMessage += `\n\n📛 รายการที่ล้มเหลว:\n` + errorList.join('\n');
      }
      
      if (errorList.length > 0) {
        showError(summaryMessage);
      } else {
        showSuccess(summaryMessage);
      }
      
    } catch (fatal) {
      console.error('[Fatal error]:', fatal);
      showError('เกิดข้อผิดพลาดร้ายแรง: ' + fatal.message);
    }
  }
  
  function selectAllStudents() {
    const checkbox = document.getElementById('selectAllCheckbox');
    const allCheckboxes = document.querySelectorAll('.student-checkbox');
    
    if (checkbox.checked) {
      const allIds = currentStudents.map(s => s.id);
      selectedStudents = new Set([...selectedStudents, ...allIds]);
      allCheckboxes.forEach(cb => cb.checked = true);
    } else {
      selectedStudents.clear();
      allCheckboxes.forEach(cb => cb.checked = false);
    }
    
    updateSelectionUI();
  }
  
  function init() {
    // console.log('✅ [Init] Export Reports with PDF Animation');
    
    const gradeSelect = document.getElementById('studentGrade');
    if (gradeSelect) {
      gradeSelect.addEventListener('change', loadStudentList);
    }
    
    const classSelect = document.getElementById('studentClassNo');
    if (classSelect) {
      classSelect.addEventListener('change', loadStudentList);
    }
    
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');
    if (selectAllCheckbox) {
      selectAllCheckbox.addEventListener('change', selectAllStudents);
    }
    
    const singleForm = document.getElementById('studentReportForm');
    if (singleForm) {
      singleForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (selectedStudents.size === 1) {
          generateSingleReport();
        }
      });
    }
    
    const bulkBtn = document.getElementById('bulkReportBtn');
    if (bulkBtn) {
      bulkBtn.addEventListener('click', (e) => {
        e.preventDefault();
        generateBulkReports();
      });
    }
    
    // console.log('✅ [Init] Ready');
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  
})();

// console.log('✅ Export Reports Module Loaded with PDF Animation');
  </script>
</body>
</html>
