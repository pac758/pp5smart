<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ลืมรหัสผ่าน - ระบบ ปพ.5 ออนไลน์</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display:flex; align-items:center; justify-content:center; margin:0;
    }
    .container {
      background: #fff; border-radius: 15px; padding: 32px 28px; width:100%; max-width: 420px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align:center; animation: fadeIn .5s ease-out;
    }
    @keyframes fadeIn{from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)}}
    h1{margin:0 0 8px; color:#333; font-weight:700; font-size:1.4rem}
    p.sub{margin:0 0 16px; color:#666; font-size:.95rem}
    .form-group{text-align:left; margin:16px 0}
    label{display:block; margin-bottom:8px; color:#333; font-weight:600}
    input[type="text"]{
      width:100%; padding:12px; border:2px solid #e1e8ed; border-radius:10px; font-size:16px;
      transition:border-color .2s ease; box-sizing:border-box;
    }
    input[type="text"]:focus{outline: none; border-color:#667eea}
    .btn{
      width:100%; padding:12px; border:none; border-radius:10px; color:#fff; font-weight:700; cursor:pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: transform .1s, box-shadow .2s;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 5px 15px rgba(102,126,234,.3); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none }
    .link-row{display:flex; justify-content:space-between; gap:8px; margin-top:12px}
    .link{display:inline-block; color:#667eea; text-decoration:none; font-weight:600; font-size:.95rem}
    .link:hover{text-decoration:underline}
    .status{margin-top:14px; font-size:.95rem}
    .ok{color:#10B981}
    .err{color:#EF4444}
    .muted{color:#666; font-size:.9rem}
    .loading { display:none; text-align:center; font-size:14px; color:#444; margin-top:10px}
    .spinner{display:inline-block; width:14px;height:14px;border:2px solid #f3f3f3;border-top:2px solid #667eea;border-radius:50%;
      animation:spin .8s linear infinite;margin-right:8px}
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="container">
    <h1>ลืมรหัสผ่าน</h1>
    <p class="sub">กรอกชื่อผู้ใช้ของคุณ ระบบจะสร้างรหัสผ่านชั่วคราวและส่งไปที่อีเมลในระบบ</p>

    <form id="fpForm">
      <div class="form-group">
        <label for="fpUsername">ชื่อผู้ใช้</label>
        <input type="text" id="fpUsername" placeholder="เช่น somchai" required autocomplete="username"/>
      </div>
      <button type="submit" id="fpBtn" class="btn">ขอรหัสผ่านชั่วคราว</button>
      <div id="fpLoading" class="loading"><span class="spinner"></span>กำลังส่งคำขอ...</div>
      <div id="fpStatus" class="status"></div>
    </form>

    <div class="link-row">
      <a class="link" href="#" id="backToLogin">ย้อนกลับไปหน้าเข้าสู่ระบบ</a>
      <a class="link" href="#" id="openHelp">คู่มือการใช้งาน</a>
    </div>
    <p class="muted" style="margin-top:12px">หากไม่มีอีเมลในระบบ โปรดติดต่อผู้ดูแล</p>
  </div>

  <script>
    (function(){
      const $ = s => document.querySelector(s);
      const on = (el,ev,fn)=> el && el.addEventListener(ev,fn);
      const show = (el,disp='block')=> el && (el.style.display=disp);
      const hide = el => el && (el.style.display='none');

      on(document, 'DOMContentLoaded', init);

      function init(){
        on($('#fpForm'), 'submit', submitReset);
        on($('#backToLogin'), 'click', (e)=>{ e.preventDefault(); goLogin(); });
        on($('#openHelp'), 'click', (e)=>{ e.preventDefault(); openHelp(); });
      }

      function submitReset(e){
        e.preventDefault();
        const username = ($('#fpUsername').value || '').trim();
        setBusy(true);
        setStatus();

        if (!username) {
          setBusy(false);
          setStatus('กรุณากรอกชื่อผู้ใช้', true);
          return;
        }

        if (!(typeof google !== 'undefined' && google.script && google.script.run)) {
          setBusy(false);
          setStatus('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้', true);
          return;
        }

        // watchdog
        const w = setTimeout(()=>{ setBusy(false); setStatus('การเชื่อมต่อใช้เวลานาน กรุณาลองใหม่', true); }, 20000);

        google.script.run
          .withSuccessHandler(res=>{
            clearTimeout(w);
            setBusy(false);
            if (res && res.success){
              setStatus(res.message || 'ส่งรหัสผ่านชั่วคราวไปที่อีเมลของคุณแล้ว');
            } else {
              setStatus((res && res.message) ? res.message : 'ไม่สามารถทำรายการได้', true);
            }
          })
          .withFailureHandler(err=>{
            clearTimeout(w);
            setBusy(false);
            setStatus('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่', true);
            console.error('requestPasswordReset error:', err);
          })
          .requestPasswordReset({ username: username });
      }

      function setBusy(b){
        $('#fpBtn').disabled = !!b;
        b ? show($('#fpLoading')) : hide($('#fpLoading'));
      }
      function setStatus(msg, isErr){
        const box = $('#fpStatus');
        if (!msg) { box.textContent=''; box.className='status'; return; }
        box.textContent = msg;
        box.className = 'status ' + (isErr ? 'err':'ok');
      }

      // --- Back to Login (force /exec) ---
  function goLogin(ev){
    if (ev) ev.preventDefault();

    var _fix = function(s) { try { var r=document.referrer||''; if(r){var b=r.split('?')[0].replace(/\/dev$/,'/exec'); if(b.endsWith('/exec')){if(s){var m=s.match(/\/s\/([^\/]+)\/exec/); if(m&&b.includes(m[1]))return b;} return b;}} } catch(_){} return s||''; };
    var goTo = function(base) { window.location.replace((base || location.origin + location.pathname) + '?page=login'); };

    try {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        var done = false;
        var to = setTimeout(function(){ if(!done){ done=true; goTo(_fix('')); } }, 2000);

        google.script.run
          .withSuccessHandler(function(url){
            if(done) return; done=true; clearTimeout(to);
            goTo(_fix(url));
          })
          .withFailureHandler(function(){
            if(done) return; done=true; clearTimeout(to);
            goTo(_fix(''));
          })
          .getDeploymentUrl();

        return false;
      }
    } catch(_) {}

    goTo(_fix(''));
    return false;
  }

  // ผูกปุ่มกลับไปหน้าเข้าสู่ระบบ (ถ้ายังไม่ได้ผูก)
  document.addEventListener('DOMContentLoaded', () => {
    const back = document.getElementById('backToLogin');
    if (back) {
      back.addEventListener('click', goLogin);
    }
  });
  
      function openHelp(){
        alert('ติดต่อผู้ดูแลระบบเพื่อขอความช่วยเหลือ');
      }
    })();
  </script>
</body>
</html>
