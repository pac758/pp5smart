// 💾 Offline Mode (Final Feature!)
// ========================================
(function(){
  // console.log('🚀 กำลังติดตั้ง Offline Mode...');
  
  const STORAGE_PREFIX = 'scoreEntry_offline_';
  let isOnline = navigator.onLine;
  let pendingSyncData = [];
  
  // ฟังก์ชันสร้าง Storage Key
  function getStorageKey(grade, classNo, subject, termId) {
    return `${STORAGE_PREFIX}${grade}_${classNo}_${subject}_${termId}`;
  }
  
  // ฟังก์ชันบันทึกข้อมูลในเครื่อง
  function saveToLocalStorage(key, data) {
    try {
      const payload = {
        data: data,
        timestamp: Date.now(),
        synced: false
      };
      localStorage.setItem(key, JSON.stringify(payload));
      return true;
    } catch (e) {
      console.error('LocalStorage Error:', e);
      showOfflineNotification('⚠️ เต็มพื้นที่เก็บข้อมูล', 'warning');
      return false;
    }
  }
  
  // ฟังก์ชันโหลดข้อมูลจากเครื่อง
  function loadFromLocalStorage(key) {
    try {
      const stored = localStorage.getItem(key);
      if (stored) {
        const payload = JSON.parse(stored);
        return payload.data;
      }
    } catch (e) {
      console.error('Load Error:', e);
    }
    return null;
  }
  
  // ฟังก์ชันดึงข้อมูลที่ยังไม่ sync
  function getPendingSyncKeys() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith(STORAGE_PREFIX)) {
        try {
          const payload = JSON.parse(localStorage.getItem(key));
          if (!payload.synced) {
            keys.push(key);
          }
        } catch (e) {
          console.error('Parse Error:', e);
        }
      }
    }
    return keys;
  }
  
  // ฟังก์ชันแสดงสถานะ
  function updateOnlineStatus() {
  isOnline = navigator.onLine;
  
  const statusPanel = document.getElementById('offlineStatusPanel');
  
  if (statusPanel) {
    if (isOnline) {
      // เช็คว่ามีข้อมูลที่ต้อง sync ไหม
      const pendingKeys = getPendingSyncKeys();
      if (pendingKeys.length > 0) {
        statusPanel.innerHTML = '🔄';
        statusPanel.title = `ออนไลน์ - มี ${pendingKeys.length} รายการรอ Sync (คลิกเพื่อ Sync)`;
        statusPanel.style.borderColor = '#f59e0b';
        showOfflineNotification(`📡 กลับมาออนไลน์! มี ${pendingKeys.length} รายการรอ Sync`, 'info', 3000);
      } else {
        statusPanel.innerHTML = '🟢';
        statusPanel.title = 'ออนไลน์ - ทุกอย่างพร้อม';
        statusPanel.style.borderColor = '#10b981';
      }
    } else {
      statusPanel.innerHTML = '🟠';
      statusPanel.title = 'ออฟไลน์ - ข้อมูลจะบันทึกในเครื่อง';
      statusPanel.style.borderColor = '#f59e0b';
      showOfflineNotification('📡 ออฟไลน์ - ข้อมูลจะบันทึกในเครื่อง', 'warning', 3000);
    }
  }
}
  
  // ฟังก์ชัน Sync ข้อมูล
  function syncOfflineData() {
    const pendingKeys = getPendingSyncKeys();
    
    if (pendingKeys.length === 0) {
      showOfflineNotification('✅ ไม่มีข้อมูลที่ต้อง Sync', 'success');
      return;
    }
    
    if (!isOnline) {
      showOfflineNotification('⚠️ ไม่สามารถ Sync ได้ - ออฟไลน์อยู่', 'warning');
      return;
    }
    
    showOfflineNotification(`🔄 กำลัง Sync ${pendingKeys.length} รายการ...`, 'info');
    
    let synced = 0;
    let failed = 0;
    
    pendingKeys.forEach((key, index) => {
      setTimeout(() => {
        try {
          const payload = JSON.parse(localStorage.getItem(key));
          
          // กดปุ่มบันทึกของระบบเดิม
          const activeTab = document.querySelector('.tab-pane.active');
          if (activeTab) {
            const isterm1 = activeTab.id === 'scoreEntryTerm1';
            const saveButton = document.getElementById(isterm1 ? 'scoreEntryBtnSaveTerm1' : 'scoreEntryBtnSaveTerm2');
            
            if (saveButton && !saveButton.disabled) {
              saveButton.click();
              
              // ทำเครื่องหมายว่า sync แล้ว
              payload.synced = true;
              localStorage.setItem(key, JSON.stringify(payload));
              synced++;
            } else {
              failed++;
            }
          }
        } catch (e) {
          console.error('Sync Error:', e);
          failed++;
        }
        
        // แสดงผลลัพธ์เมื่อเสร็จ
        if (index === pendingKeys.length - 1) {
          setTimeout(() => {
            if (synced > 0) {
              showOfflineNotification(`✅ Sync สำเร็จ ${synced} รายการ`, 'success');
            }
            if (failed > 0) {
              showOfflineNotification(`⚠️ Sync ล้มเหลว ${failed} รายการ`, 'warning');
            }
            updateOnlineStatus();
          }, 1000);
        }
      }, index * 500);
    });
  }
  
  // ฟังก์ชันแสดง Notification
  function showOfflineNotification(message, type = 'info', duration = 3000) {
    const colors = {
      success: { bg: '#d1fae5', border: '#10b981', color: '#065f46', icon: '✅' },
      warning: { bg: '#fef3c7', border: '#f59e0b', color: '#92400e', icon: '⚠️' },
      error: { bg: '#fee2e2', border: '#ef4444', color: '#991b1b', icon: '❌' },
      info: { bg: '#dbeafe', border: '#3b82f6', color: '#1e40af', icon: 'ℹ️' }
    };
    
    const style = colors[type];
    
    const notification = document.createElement('div');
    notification.style.cssText = `
      position: fixed;
      top: 200px;
      right: 20px;
      padding: 14px 20px;
      background: ${style.bg};
      border: 2px solid ${style.border};
      color: ${style.color};
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
      z-index: 10005;
      font-weight: 600;
      font-size: 0.95rem;
      animation: slideInRight 0.3s ease-out;
      max-width: 350px;
      display: flex;
      align-items: center;
      gap: 10px;
    `;
    
    notification.innerHTML = `
      <span style="font-size: 1.2rem;">${style.icon}</span>
      <span>${message}</span>
    `;
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
      notification.style.animation = 'slideOutRight 0.3s ease-out';
      setTimeout(() => notification.remove(), 300);
    }, duration);
  }
  
  // สร้าง Status Panel (ปุ่มไอคอนเล็ก)

  
  // เพิ่ม CSS
  const style = document.createElement('style');
style.textContent = `
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
`;
document.head.appendChild(style);
  
  // Event Listeners
  // ฟังการเปลี่ยนแปลงสถานะออนไลน์/ออฟไลน์
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  
  // Hook เข้าไปในระบบบันทึกเดิม
  const originalSaveButton1 = document.getElementById('scoreEntryBtnSaveTerm1');
  const originalSaveButton2 = document.getElementById('scoreEntryBtnSaveTerm2');
  
  function hookSaveButton(button, termId) {
    if (!button) return;
    
    button.addEventListener('click', function() {
      // ถ้าออฟไลน์ ให้บันทึกในเครื่อง
      if (!isOnline) {
        setTimeout(() => {
          const gradeSelect = document.getElementById('scoreEntryGradeSelect');
          const classSelect = document.getElementById('scoreEntryClassSelect');
          const subjectSelect = document.getElementById('scoreEntrySubjectSelect');
          
          if (gradeSelect && classSelect && subjectSelect && subjectSelect.value) {
            const grade = gradeSelect.value;
            const classNo = classSelect.value;
            const subject = JSON.parse(subjectSelect.value);
            
            const containerId = `scoreEntry${termId.charAt(0).toUpperCase() + termId.slice(1)}Container`;
            const container = document.getElementById(containerId);
            const table = container?.querySelector('table');
            
            if (table) {
              const data = {
                grade: grade,
                classNo: classNo,
                subject: subject,
                timestamp: Date.now()
              };
              
              const key = getStorageKey(grade, classNo, subject.code, termId);
              if (saveToLocalStorage(key, data)) {
                showOfflineNotification('💾 บันทึกในเครื่องสำเร็จ (ออฟไลน์)', 'success');
              }
            }
          }
        }, 500);
      }
    });
  }
  
  hookSaveButton(originalSaveButton1, 'term1');
  hookSaveButton(originalSaveButton2, 'term2');
  
  // ตรวจสอบสถานะเริ่มต้น
  updateOnlineStatus();
  
  // แสดงจำนวนข้อมูลที่เก็บไว้
  const storedCount = getPendingSyncKeys().length;
  if (storedCount > 0) {
    // console.log(`📦 พบข้อมูลที่เก็บไว้: ${storedCount} รายการ`);
  }
  
  // เพิ่มข้อมูลในคอนโซล
  window.offlineManager = {
    getStorageInfo: function() {
      const keys = getPendingSyncKeys();
      // console.log('=== Offline Storage Info ===');
      // console.log(`Total pending: ${keys.length}`);
      keys.forEach((key, i) => {
        const payload = JSON.parse(localStorage.getItem(key));
        // console.log(`${i+1}. ${key}`);
        // console.log(`   Timestamp: ${new Date(payload.timestamp).toLocaleString()}`);
        // console.log(`   Synced: ${payload.synced}`);
      });
    },
    clearStorage: function() {
      const keys = Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX));
      keys.forEach(k => localStorage.removeItem(k));
      // console.log(`✅ ล้างข้อมูล ${keys.length} รายการ`);
      updateOnlineStatus();
    },
    syncNow: syncOfflineData
  };
  
  // console.log('✅ Offline Mode ติดตั้งสำเร็จ!');
  // console.log('ℹ️ พิมพ์ offlineManager.getStorageInfo() เพื่อดูข้อมูลที่เก็บไว้');
  // console.log('ℹ️ พิมพ์ offlineManager.syncNow() เพื่อ Sync ทันที');

})();
